// ── Helpers ───────────────────────────────────────────────────────────────────
// Parse YYYY-MM-DD as LOCAL noon to avoid UTC midnight rolling back a day in CDT/CST (UTC-5/6)
function localDate(str) {
  if (!str) return null;
  const iso = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return new Date(Number(iso[1]), Number(iso[2])-1, Number(iso[3]), 12, 0, 0);
  return new Date(str);
}
const fmtDate = d => { if(!d) return ""; const x=localDate(d); return (x&&!isNaN(x)) ? x.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"}) : ""; };
const isFuture = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c>=TODAY; };
const isPast   = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c<TODAY; };

function parseDate(s) {
  if (!s) return null;
  // "Thu Mar 12 2026" style: named months parse as local time, safe
  const m = s.match(/(\w{3}\s+\w{3}\s+\d+\s+\d{4})/);
  if (m) {
    const d = new Date(m[1]);
    if (!isNaN(d)) return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  // YYYY-MM-DD passthrough (already correct format, localDate() will handle display)
  const iso = s.match(/^(\d{4}-\d{2}-\d{2})/);
  if (iso) return iso[1];
  const d2 = new Date(s);
  return isNaN(d2) ? null : d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");
}
function parseType(t) {
  if (!t) return "Other"; const s=t.toLowerCase();
  if (s.includes("sundowner")) return "Sundowner";
  if (s.includes("gala"))      return "Gala";
  if (s.includes("conference")||s.includes("ausii")) return "Conference";
  if (s.includes("coffee")||s.includes("monday")||s.includes("network")||s.includes("multinational")) return "Networking";
  if (s.includes("anzac")||s.includes("remembrance")) return "Cultural";
  return "Other";
}

// ── callClaude (uses settings for API key) ────────────────────────────────────
async function callClaude(messages, system, settings) {
  // Try settings param first, then fall back to reading from localStorage directly
  let apiKey = (settings&&settings.useSharedKey ? settings&&settings.sharedApiKey : settings&&settings.apiKey) || "";
  if (!apiKey) {
    try {
      const s = JSON.parse(localStorage.getItem("aacc-settings-v1")||"{}");
      apiKey = s.useSharedKey ? s.sharedApiKey : s.apiKey;
    } catch {}
  }
  apiKey = apiKey || window.ANTHROPIC_API_KEY || localStorage.getItem("aacc-api-key") || "";
  if (!apiKey) throw new Error("NO_API_KEY");
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,
             "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system,messages})
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error((e&&e.error&&e.error.message)||"API error "+r.status);
  }
  return r.json();
}

// ── Image utilities ───────────────────────────────────────────────────────────
// Claude.ai CSP blocks direct CloudFront images — proxy through images.weserv.nl
function proxyImg(url) {
  // Direct CloudFront URLs load fine from a.claude.ai — no proxy needed
  return url || null;
}

async function fetchImageAsBase64(url) {
  // CloudFront blocks CORS entirely — crossOrigin="anonymous" poisons the browser cache
  // and breaks subsequent plain <img src> loads for the same URL.
  // For exports, just embed the URL as a markdown image link instead of base64.
  return null;
}

// ── Export utilities ──────────────────────────────────────────────────────────
function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function exportMarkdown(eventsToExport, posts, editedPosts) {
  const ts = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  let md = `# Social Media Posts\n_Exported ${ts}_\n\n---\n\n`;
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    md += `## ${ev.title}\n`;
    md += `**Date:** ${fmtDate(ev.date)}  \n`;
    if (ev.venue)   md += `**Venue:** ${ev.venue}  \n`;
    if (ev.address) md += `**Address:** ${ev.address}  \n`;
    md += `**Type:** ${ev.type}  \n`;
    if (ev.url) md += `**Link:** ${ev.url}  \n`;
    md += `\n`;
    // Embed image
    if (ev.imageUrl) {
      md += `![${ev.title}](${ev.imageUrl})\n\n`;
    }
    ALL_PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      md += `### ${pl.label}\n\n${text}\n\n`;
    });
    md += `---\n\n`;
  });
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.md`, md, "text/markdown");
}

function exportCSV(eventsToExport, posts, editedPosts) {
  const rows = [["Event","Date","Venue","Type","Platform","Post Text","Character Count","Generated At"]];
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    ALL_PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      const safe = (s) => `"${String(s).replace(/"/g,'""')}"`;
      rows.push([safe(ev.title), safe(fmtDate(ev.date)), safe(ev.venue||""), safe(ev.type), safe(pl.label), safe(text), text.length, safe(p.generatedAt ? new Date(p.generatedAt).toLocaleDateString() : "")]);
    });
  });
  const csv = rows.map(r => r.join(",")).join("\n");
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.csv`, csv, "text/csv");
}

function exportTxt(eventsToExport, posts, editedPosts) {
  const ts = new Date().toLocaleString();
  let txt = `AACC TEXAS — SOCIAL MEDIA POSTS\nExported: ${ts}\n${"=".repeat(60)}\n\n`;
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    txt += `EVENT: ${ev.title}\n`;
    txt += `Date:  ${fmtDate(ev.date)}\n`;
    if (ev.venue)   txt += `Venue: ${ev.venue}\n`;
    if (ev.address) txt += `Addr:  ${ev.address}\n`;
    txt += `\n`;
    ALL_PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      txt += `[ ${pl.label.toUpperCase()} — ${text.length} chars ]\n`;
      txt += `${"-".repeat(40)}\n${text}\n\n`;
    });
    txt += `${"=".repeat(60)}\n\n`;
  });
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.txt`, txt, "text/plain");
}

                <input type={showPersonalKey?"text":"password"} value={local.apiKey} onChange={e=>set("apiKey",e.target.value)}

                  <div style={{marginTop:"8px",fontSize:"12px",color:T.textSub}}>
                    Get yours at <a href="https://platform.claude.com/settings/keys" target="_blank" rel="noopener noreferrer" style={{color:"#3B82F6"}}>platform.claude.com/settings/keys</a>
                  </div>

            <label style={{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer"}}>

                <div style={{fontSize:"14px",color:T.text,fontWeight:"bold"}}>Use shared key (admin-provided)</div>
                <div style={{fontSize:"12px",color:T.textSub}}>Admin pays for all usage — enter the key they shared with you</div>
              </div>
            </label>
            {local.useSharedKey&&(
              <div style={{position:"relative"}}>
                <input type={showSharedKey?"text":"password"} value={local.sharedApiKey} onChange={e=>set("sharedApiKey",e.target.value)}
                  placeholder="sk-ant-api03-..." style={inputStyle(T)}/>
                <button onClick={()=>setShowSharedKey(s=>!s)} style={eyeBtn}>{showSharedKey?"🙈":"👁️"}</button>

        {/* ── Step 2: Event Source ────────────────────────────────────────── */}
        <Section num="2" title="Event Source URL" subtitle="The web page to scan for events" complete={!!local.eventSourceUrl.trim()}>
          <input type="url" value={local.eventSourceUrl} onChange={e=>set("eventSourceUrl",e.target.value)}
            placeholder="https://www.aacc-texas.org/events.html#!event-list"
            style={{...inputStyle(T),fontFamily:"monospace",fontSize:"12px"}}/>
          <div style={{fontSize:"12px",color:T.textSub,marginTop:"8px",lineHeight:"1.6"}}>
            💡 This URL is used when you click "Auto Scan". For Weebly-based sites, use the Console Script method instead.
          </div>
        </Section>

        {/* ── Step 3: Posting Platforms ───────────────────────────────────── */}
        <Section num="3" title="Posting Platforms" subtitle={`Select at least one • ${activePlatforms} selected`} complete={activePlatforms>=1}>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {platformDefs.map(p=>(
              <label key={p.key} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:local.platforms[p.key]?"rgba(0,48,143,.2)":"rgba(0,0,0,.2)",border:"0.5px solid "+(local.platforms[p.key]?T.accent:T.border),borderRadius:"10px",cursor:"pointer",transition:"all .15s"}}>
                <div style={{width:"18px",height:"18px",borderRadius:"4px",border:"2px solid "+(local.platforms[p.key]?p.color:T.border),background:local.platforms[p.key]?p.color:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                  {local.platforms[p.key]&&<span style={{color:"#fff",fontSize:"11px",lineHeight:1,fontWeight:"bold"}}>✓</span>}
                </div>
                <input type="checkbox" checked={!!local.platforms[p.key]} onChange={e=>setPlatform(p.key,e.target.checked)} style={{display:"none"}}/>
                <div style={{width:"28px",height:"28px",borderRadius:"6px",background:p.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"12px",flexShrink:0}}>{p.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",color:T.text,fontWeight:"bold"}}>{p.label}</div>
                  <div style={{fontSize:"12px",color:T.textSub}}>{p.desc}</div>
                </div>
              </label>
            ))}
          </div>

          {/* Email recipient */}
          {local.platforms.email&&(
            <div style={{marginTop:"12px",padding:"14px 16px",background:"rgba(5,150,105,.08)",border:"1px solid #05966933",borderRadius:"10px"}}>
              <div style={{fontSize:"13px",color:T.text,fontWeight:"bold",marginBottom:"8px"}}>✉️ Default Email Recipient (optional)</div>
              <input type="email" value={local.emailTo} onChange={e=>set("emailTo",e.target.value)}
                placeholder="e.g. members@aacc-texas.org"
                style={inputStyle(T)}/>
              <div style={{fontSize:"12px",color:T.textSub,marginTop:"6px"}}>Leave blank to open email client with empty To: field</div>
            </div>
          )}
        </Section>

        {/* ── Save button ─────────────────────────────────────────────────── */}
        <div style={{display:"flex",flexDirection:"column",gap:"10px",alignItems:"center"}}>
          {!canSave&&(
            <div style={{fontSize:"13px",color:"#F87171",textAlign:"center",lineHeight:"1.6"}}>
              {!hasApiKey&&"⚠️ Add an API key  "}
              {activePlatforms<1&&"⚠️ Select at least one platform"}
            </div>
          )}
          <button onClick={handleSave} disabled={!canSave} style={{
            background:canSave?T.btnPrimary:T.btnGhost,
            color:canSave?T.btnPrimaryText:T.textSub,border:"none",borderRadius:"10px",
            padding:"14px 40px",cursor:canSave?"pointer":"not-allowed",
            fontSize:"16px",fontWeight:"bold",width:"100%",maxWidth:"320px",
            transition:"all .2s",
          }}>
            {saved?"✅ Settings Saved!":isFirstRun?"✅ Save & Start Using App":"💾 Save Settings"}
          </button>
        </div>

      </div>
    </div>
  );
}

}


// ═════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const [events,      setEvents]      = useState([]);
  const [posts,       setPosts]       = useState({});
  const [editedPosts, setEditedPosts] = useState({});
  const [lastScan,    setLastScan]    = useState(null);
  const [scanning,    setScanning]    = useState(false);
  const [scanStep,    setScanStep]    = useState("");
  const [genId,       setGenId]       = useState(null);
  const [activeTab,   setActiveTab]   = useState("upcoming");
  const [expandedId,  setExpandedId]  = useState(null);
  const [notif,       setNotif]       = useState(null);
  const [modal,       setModal]       = useState(null);
  const [showExport,  setShowExport]  = useState(false);
  const [showPaste,   setShowPaste]   = useState(false);
  const [pasteText,   setPasteText]   = useState("");
  const [recapUrl,    setRecapUrl]    = useState("");
  const [recapPosts,  setRecapPosts]  = useState(null);
  const [recapLoading,setRecapLoading]= useState(false);
  const [recapError,  setRecapError]  = useState(null);
  const [scriptCopied,setScriptCopied]= useState(false);
  const [showSettings,setShowSettings]= useState(false);
  const saved_theme = localStorage.getItem("sma-theme-v1"); const [isDark, setIsDark] = useState(saved_theme===null ? false : saved_theme==="dark");
  const [settings,    setSettings]    = useState(DEFAULT_SETTINGS);
  const [settingsLoaded, setSettingsLoaded] = useState(false);
  // ── Batch queue: [{eventId, platformKey, text}]
  const [queue,       setQueue]       = useState([]);
  const [showBatch,   setShowBatch]   = useState(false);
  const [postedPlatforms, setPostedPlatforms] = useState({});
  const [promptModal, setPromptModal]   = useState(null); // {eventId, action, event} or {action:'recap'}

  const toggleTheme = () => {
    const n = !isDark;
    setIsDark(n);
    try { localStorage.setItem(SK_THEME, n ? "dark" : "light"); } catch(e){}
  };
  useEffect(()=>{
    try {
      const saved = localStorage.getItem(SK_THEME);
      // Only apply saved theme if it was set by THIS version
      if (saved === "dark" || saved === "light") setIsDark(saved === "dark");
      // Default: dark mode
    } catch(e){}
  },[]);

  // ── Load all persisted data ─────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      // Load settings first (localStorage - synchronous, works on GitHub Pages)
      try {
        const raw = localStorage.getItem(SK_SETTINGS);
        if (raw) {
          const s = JSON.parse(raw);
          const merged = {...DEFAULT_SETTINGS,...s, platforms:{...DEFAULT_SETTINGS.platforms,...(s.platforms||{})}};
          setSettings(merged);
          if (!merged.setupComplete) setShowSettings(true);
        } else {
          setShowSettings(true); // brand new user
        }
      } catch { setShowSettings(true); }
      setSettingsLoaded(true);

      // Load events
      try {
        let evs = KNOWN_EVENTS.map(e=>({...e}));
        const raw = localStorage.getItem(SK_EVENTS);
        if (raw) {
          const stored = JSON.parse(raw);
          evs = evs.map(e=>{ const s=stored.find(x=>x.id===e.id); return s?{...e,...s,imageUrl:e.imageUrl}:e; });
          const knownIds = new Set(evs.map(e=>e.id));
          const extras = stored.filter(e=>!knownIds.has(e.id));
          if (extras.length) evs=[...evs,...extras].sort((a,b)=>a.date>b.date?1:-1);
        }
        localStorage.setItem(SK_EVENTS, JSON.stringify(evs));
        setEvents(evs);
      } catch {}

      // Load posts
      try {
        let rawP = localStorage.getItem(SK_POSTS) || localStorage.getItem("aacc-posts-v2");
        if (rawP) {
          const p=JSON.parse(rawP); setPosts(p);
          localStorage.setItem(SK_POSTS, JSON.stringify(p));
          const ep={};
          Object.keys(p).forEach(id=>{
            ep[id]={linkedin:p[id].linkedin||"",twitter:p[id].twitter||"",facebook:p[id].facebook||"",instagram:p[id].instagram||"",email:p[id].email||"",file:p[id].file||""};
          });
          setEditedPosts(ep);
        }
      } catch {}
      try { const sc=localStorage.getItem(SK_SCAN); if(sc) setLastScan(sc); } catch {}
    })();
  },[]);

  const toast = (msg,type="ok") => { setNotif({msg,type}); setTimeout(()=>setNotif(null),4000); };
  const saveEvents = async (ev) => { setEvents(ev); try{localStorage.setItem(SK_EVENTS,JSON.stringify(ev));}catch{} };
  const savePosts  = async (p)  => { setPosts(p);  try { localStorage.setItem(SK_POSTS, JSON.stringify(p)); } catch {} };

  const saveSettings = async (s) => {
    setSettings(s);
    try { localStorage.setItem(SK_SETTINGS, JSON.stringify(s)); } catch {}
    toast("Settings saved ✓");
  };

  // ── Active platforms (from settings) ──────────────────────────────────────
  const activePlatforms = ALL_PLATFORMS.filter(p => settings.platforms[p.key]);

  // ── Queue helpers ──────────────────────────────────────────────────────────
  const addToQueue = (event, platformKey) => {
    const text = (editedPosts[event.id]&&editedPosts[event.id][platformKey])||(posts[event.id]&&posts[event.id][platformKey])||"";
    setQueue(prev => {
      const filtered = prev.filter(q => !(q.eventId===event.id && q.platformKey===platformKey));
      return [...filtered, {eventId:event.id, platformKey, text, eventTitle:event.title, eventDate:event.date}];
    });
    toast(`Added to queue: ${(ALL_PLATFORMS.find(p=>p.key===platformKey)||{}).label}`);
  };
  const removeFromQueue = (eventId, platformKey) => {
    setQueue(prev => prev.filter(q => !(q.eventId===eventId && q.platformKey===platformKey)));
  };
  const updateQueueText = (eventId, platformKey, text) => {
    setQueue(prev => prev.map(q => q.eventId===eventId && q.platformKey===platformKey ? {...q,text} : q));
  };
  const isQueued = (eventId, platformKey) => queue.some(q=>q.eventId===eventId && q.platformKey===platformKey);


  // ── Process scraped events ─────────────────────────────────────────────────
  const processScrapedEvents = useCallback((raw)=>{
    if(!Array.isArray(raw)){toast("Invalid data format","err");return;}
    const incoming=raw.map(e=>({...e,date:e.date||parseDate(e.starts),type:e.type||parseType(e.title)}))
      .filter(e=>e.date&&localDate(e.date)>=ONE_MONTH_AGO);
    setEvents(prev=>{
      const incomingMap=Object.fromEntries(incoming.map(e=>[e.id,e]));
      const existingUpdated=prev.filter(e=>localDate(e.date)>=ONE_MONTH_AGO).map(e=>incomingMap[e.id]?{...e,...incomingMap[e.id]}:e);
      const existingIds=new Set(existingUpdated.map(e=>e.id));
      const brandNew=incoming.filter(e=>!existingIds.has(e.id));
      const merged=[...existingUpdated,...brandNew].sort((a,b)=>localDate(a.date)-localDate(b.date));
      try{localStorage.setItem(SK_EVENTS,JSON.stringify(merged));}catch{}
      return merged;
    });
    const now=new Date().toLocaleString();
    setLastScan(now); try{localStorage.setItem(SK_SCAN,now);}catch{}
    setScanStep(`✅ Done! Loaded ${incoming.length} event(s).`);
    toast(`${incoming.length} event(s) loaded.`);
    setScanning(false); setShowPaste(false); setPasteText("");
  },[]);

  // ── Auto scan ──────────────────────────────────────────────────────────────
  const autoScan = useCallback(async()=>{
    if (!settings.setupComplete) { setShowSettings(true); return; }
    setScanning(true); setScanStep("🤖 Searching for events...");
    try {
      const data=await callClaude([{role:"user",content:`Search for upcoming events. Today is ${TODAY.toISOString().split("T")[0]}. I need events from ${ONE_MONTH_AGO.toISOString().split("T")[0]} onwards from aacc-texas.org/events.html. Return ONLY a JSON array (no markdown). Each object: {"id":"slug-YYYY-MM-DD","title":"","date":"YYYY-MM-DD","starts":"","ends":"","venue":"","address":"","description":"","registration":"Open|Closed|Unknown","url":"https://www.aacc-texas.org/events.html#!event/...","type":"Sundowner|Gala|Conference|Networking|Cultural|Other","imageUrl":null}`}],
        "Return ONLY a raw JSON array. No markdown. No explanation.", settings);
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);
      if(!match){setScanStep("⚠️ Web search failed — loading last known events."); processScrapedEvents(KNOWN_EVENTS); return;}
      try{processScrapedEvents(JSON.parse(match[0]));}catch{processScrapedEvents(KNOWN_EVENTS);}
    }catch(e){
      if(e.message==="NO_API_KEY"){setShowSettings(true); setScanning(false); setScanStep(""); return;}
      setScanStep("⚠️ Error — loading last known events."); processScrapedEvents(KNOWN_EVENTS);
    }
  },[settings, processScrapedEvents]);

  const processPaste=useCallback(()=>{
    if(!pasteText.trim())return;
    setScanning(true); setScanStep("🔍 Parsing...");
    try {
      const match=pasteText.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);
      if(match){processScrapedEvents(JSON.parse(match[0]));}
      else{toast("No JSON array found","err"); setScanning(false);}
    }catch(e){toast("Parse error: "+e.message,"err"); setScanning(false);}
  },[pasteText,processScrapedEvents]);

  // ── Generate posts ─────────────────────────────────────────────────────────
  const generatePost = useCallback(async(event, customPrompt="")=>{
    if (!settings.setupComplete) { setShowSettings(true); return; }
    setGenId(event.id);
    const eventIsPast = isPast(event.date);
    const platformList = activePlatforms.map(p=>{
      const limits = eventIsPast ? {
        linkedin:"MAX 1300 CHARS. Past-tense recap format:\n- Opening line: \"What a fantastic [event title]!\" or similar celebratory opener\n- 2-3 short paragraphs recapping highlights, atmosphere, and who attended\n- Key takeaways or memorable moments (emoji bullets: 🌟 ✨ 💡)\n- Thank attendees and tag/mention speakers or sponsors if known\n- End with a forward-looking CTA (next event, website URL)\n- 2-3 hashtags\nTone: warm, celebratory, professional.",
        twitter:"HARD LIMIT: 260 CHARS. Past-tense recap. One punchy celebratory sentence (e.g. \"What a night! 🎉\") then the event URL on a new line. No hashtags unless under limit.",
        facebook:"MAX 800 CHARS. Past-tense recap format:\n- Celebratory opening: \"What a great [event]!\"\n- 2 short paragraphs: recap of what happened + highlights\n- Thank attendees with ✅ bullet highlights\n- Forward-looking CTA line with event/org URL\n- 3-4 hashtags\nWarm, community tone.",
        instagram:"MAX 1200 CHARS. Past-tense recap format:\n- Casual celebratory opener (e.g. \"Last night was absolutely brilliant! 🙌\")\n- 2-3 short paragraphs recapping the vibe and highlights\n- Bullet list of memorable moments (use * or emoji)\n- Tag the venue and thank attendees\n- CTA with URL for next event\n- 5-8 hashtags\nCasual, warm, community feel.",
        email:"MAX 1500 CHARS. Past-tense thank-you/recap email: subject-ready opener thanking attendees, recap of event highlights, key moments, next event details or CTA with URL, warm sign-off.",
        file:"MAX 2000 CHARS. Comprehensive past-tense recap: full event details, highlights, attendance, outcomes, next steps."
      } : {
        linkedin:"MAX 1300 CHARS. Format:\n- Opening hook sentence\n- 2-3 short paragraphs with event details\n- Key info on separate lines using emoji bullets (📍 Venue, 📅 Date/Time, 🎟️ Registration)\n- 1-sentence CTA with the event URL\n- 2-3 hashtags at the end\nProfessional, engaging tone.",
        twitter:"HARD LIMIT: 260 CHARS MAXIMUM — count every character. Format: one punchy title/hook sentence, then the event URL on a new line. No hashtags unless under limit.",
        facebook:"MAX 800 CHARS. Format:\n- Exciting opening hook\n- 2 short paragraphs: what the event is + who should attend (use ✅ bullet lines)\n- Key info lines: 📍 Venue, 📅 Date, 🕐 Time\n- RSVP CTA line with event URL\n- 3-4 hashtags at the very end\nWarm, friendly, community tone.",
        instagram:"MAX 1200 CHARS. Format:\n- Conversational opening (use 'Come say G\'day' style or casual hook)\n- 2-3 short paragraphs about the event\n- Bullet list of key features/perks (use * or emoji bullets)\n- Registration CTA with URL\n- 5-8 hashtags at the end\nCasual, warm, community feel.",
        email:"MAX 1500 CHARS. Formal invitation: subject-ready opening, full event details (date/time/venue/address), what to expect, registration instructions with URL, contact info if available.",
        file:"MAX 2000 CHARS. Comprehensive: all event details, multi-platform summary."
      };
      return `"${p.key}": "${limits[p.key]||'100-150 words'}"`;
    }).join(",\n  ");
    try {
      const orgName = settings.orgName || "";
      const hashtags = settings.hashtags || "";
      const promptVerb = eventIsPast ? "Write past-tense RECAP social media posts celebrating this event that already happened" : "Create social media posts for this upcoming event";
      const data=await callClaude([{role:"user",content:`${promptVerb}:\n\nTitle: ${event.title}\nDate: ${fmtDate(event.date)}${event.starts?" ("+event.starts+")":""}\nVenue: ${event.venue||""}${event.address?" — "+event.address:""}\nDescription: ${event.description||"Networking event."}\nType: ${event.type}\nRegistration: ${event.registration}\nURL: ${event.url}\n${orgName?"Organisation: "+orgName+"\n":""}\n${eventIsPast?"This event has ALREADY HAPPENED. All posts must be written in PAST TENSE as a celebration/recap. Do NOT use future tense or \"join us\" language.\n":""}Write posts for these platforms. Return ONLY this JSON (no markdown):\n{\n  ${platformList}\n}\n${hashtags?"Include these hashtags where appropriate: "+hashtags+"\n":""}IMPORTANT: Each post MUST include the event URL (${event.url}). Follow the format instructions precisely for each platform.${customPrompt?" Additional guidance from the user (IMPORTANT — prioritise this): "+customPrompt:""}\n`}],
        "Return ONLY valid JSON. No markdown fences. No explanation.", settings);
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
      if(!match){toast("Could not parse response — try again","err"); setGenId(null); return;}
      const parsed=JSON.parse(match[0]);
      const newPosts={...posts,[event.id]:{...parsed,generatedAt:new Date().toISOString()}};
      await savePosts(newPosts);
      setEditedPosts(prev=>({...prev,[event.id]:Object.fromEntries(activePlatforms.map(p=>[p.key,parsed[p.key]||""]))}));
      setExpandedId(event.id);
      toast("Posts generated! ✍️");

    }catch(e){
      if(e.message==="NO_API_KEY"){setShowSettings(true);}
      else toast("Error: "+e.message,"err");
    }
    setGenId(null);
  },[posts,settings,activePlatforms]);

  const updateEditedPost=(eventId,platformKey,value)=>{
    setEditedPosts(prev=>({...prev,[eventId]:{...prev[eventId],[platformKey]:value}}));
  };
  const saveEditedPost=async(eventId)=>{
    const ep=editedPosts[eventId]; if(!ep)return;
    const newPosts={...posts,[eventId]:{...posts[eventId],...ep,lastEdited:new Date().toISOString()}};
    await savePosts(newPosts); toast("Edits saved ✓");
  };
  const openModal=(event,platformKey)=>{
    const text=(editedPosts[event.id]&&editedPosts[event.id][platformKey])||(posts[event.id]&&posts[event.id][platformKey])||"";
    setModal({event,platformKey,text,editText:text});
  };
  const deleteEvent=async(id)=>{
    await saveEvents(events.filter(e=>e.id!==id));
    const np={...posts}; delete np[id]; await savePosts(np);
    const ne={...editedPosts}; delete ne[id]; setEditedPosts(ne);
    toast("Event removed.");
  };
  const copyScript=()=>{navigator.clipboard.writeText(CONSOLE_SCRIPT).then(()=>{setScriptCopied(true);setTimeout(()=>setScriptCopied(false),3000);});};

  const upcoming  = events.filter(e=>isFuture(e.date));
  const past      = events.filter(e=>isPast(e.date));
  const withPosts = events.filter(e=>posts[e.id]);

  // ── Settings page ──────────────────────────────────────────────────────────
const generateRecap = async (customPrompt="") => {
    if (!recapUrl.trim()) return;
    setRecapLoading(true); setRecapError(null); setRecapPosts(null);
    const platformList = activePlatforms.map(p=>{
      const limits={
        linkedin:"MAX 1300 CHARS. Past-tense recap format:\n- Opening: 'What a fantastic [event name]!'\n- 2 short paragraphs: highlights + thank attendees\n- 📍 Venue, 📅 Date on separate lines\n- Link back to event page\n- 2-3 hashtags\nProfessional tone.",
        twitter:"HARD LIMIT: 260 CHARS MAXIMUM — count every character. One punchy past-tense recap sentence + event URL on new line.",
        facebook:"MAX 800 CHARS. Past-tense recap:\n- Warm opening celebrating the event\n- 1-2 sentences of highlights\n- Thank-you to attendees and sponsors\n- Link back to event page\n- 3-4 hashtags at the end.",
        instagram:"MAX 1200 CHARS. Casual past-tense recap:\n- 'What an amazing night!' style opener\n- Short paragraphs with highlights\n- * bullet points of event features/moments\n- Tag or thank key people/sponsors\n- Link to event page\n- 5-8 hashtags at end.",
        email:"MAX 1500 CHARS. Thank-you recap email: warm subject line, thanks to attendees, event highlights, link to event page/photos, sign-off.",
        file:"MAX 2000 CHARS. Full recap with all highlights."
      };
      return '"'+p.key+'": "'+( limits[p.key]||"max 150 words")+'"';
    }).join(",\n  ");
    const orgName = settings.orgName || "";
    const hashtags = settings.hashtags || "";
    try {
      const data = await callClaude([{role:"user",content:`Write social media recap posts for this past event.\nEvent page URL: ${recapUrl}\n\nPast tense. Follow the format and char limits strictly.\n{\n  ${platformList}\n}\n${orgName?"Organisation: "+orgName+"\n":""}${hashtags?"Hashtags: "+hashtags+"\n":""}IMPORTANT: Each post MUST include a link back to the event page URL above.${customPrompt?" Additional guidance from the user (IMPORTANT — prioritise this): "+customPrompt:""}\nReturn ONLY valid JSON, no markdown.`}],
        "Return ONLY valid JSON. No markdown fences. No explanation. You MUST count characters and stay within the HARD limits specified. If a post exceeds the limit, cut it down before returning.", settings);
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
      if(!match) throw new Error("Could not parse response");
      setRecapPosts(JSON.parse(match[0]));
    } catch(e) {
      if(e.message==="NO_API_KEY"){setShowSettings(true);}
      else setRecapError(e.message);
    }
    setRecapLoading(false);
  };

    const T = isDark ? DARK : LIGHT;

  if (showSettings) {
    return (
      <>
        <SettingsPage
          settings={settings}
          onSave={async(s)=>{ await saveSettings(s); setShowSettings(false); }}
          onClose={settings.setupComplete ? ()=>setShowSettings(false) : null}
          isFirstRun={!settings.setupComplete}
          isDark={isDark} onToggleTheme={toggleTheme}
        />
        <style>{`@keyframes fadeSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}`}</style>
      </>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif",color:T.text}}>


      {/* Toast */}
      {notif&&<div style={{position:"fixed",top:20,right:20,zIndex:2000,background:notif.type==="err"?"#FF3B30":"#34C759",color:"#fff",padding:"12px 20px",borderRadius:"10px",boxShadow:"0 4px 16px rgba(0,0,0,.2)",fontSize:"13px",fontWeight:"600",animation:"fadeSlide .3s ease"}}>{notif.msg}</div>}

      {/* Modals */}
      {/* Custom Prompt Modal */}
      {promptModal&&(
        <PromptModal
          T={T}
          isPast={promptModal.event?isPast(promptModal.event.date):false}
          isRecap={promptModal.action==="recap"}
          onConfirm={(txt)=>{
            const pm = promptModal;
            setPromptModal(null);
            if (pm.action==="generate") generatePost(pm.event, txt);
            else if (pm.action==="recap") generateRecap(txt);
          }}
          onCancel={()=>setPromptModal(null)}
        />
      )}
      {modal&&<PreviewModal modal={modal} settings={settings} onClose={()=>setModal(null)}
        onUpdateText={(t)=>{ setModal(m=>({...m,text:t,editText:t})); updateEditedPost(modal.event.id, modal.platformKey, t); }}
        onPosted={(pKey)=>{ setPostedPlatforms(prev=>({...prev,[modal.event.id+":"+pKey]:true})); }}
      />}
      {showExport&&<ExportModal events={events} posts={posts} editedPosts={editedPosts} onClose={()=>setShowExport(false)} toast={toast} activePlatforms={activePlatforms}/>}
      {showBatch&&<BatchConfirmModal queue={queue} events={events} settings={settings}
        onUpdateText={updateQueueText} onRemove={removeFromQueue}

        onPosted={(eventId,platformKey)=>{ removeFromQueue(eventId,platformKey); toast("Posted ✓"); }}

      />}

      {/* Header */}
      <div style={{position:"relative",zIndex:10,background:T.bgCard,borderBottom:"0.5px solid "+T.border,padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px",boxShadow:isDark?"none":"0 1px 3px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:"8px",cursor:"pointer"}} onClick={()=>{setShowSettings(false);setActiveTab("upcoming");}}>
          <div style={{fontSize:"15px",fontWeight:"700",color:T.text,letterSpacing:"-.3px"}}>Social Media <span style={{color:T.accent}}>Assistant</span></div>
          <div style={{fontSize:"10px",color:T.textSub,fontFamily:"monospace"}}>{VERSION}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>

          </div>
          {Object.keys(posts).length>0&&(
            <button onClick={()=>setShowExport(true)} style={{background:T.btnGhost,color:T.btnGhostText,border:"0.5px solid "+T.btnGhostBorder,borderRadius:"20px",padding:"6px 14px",cursor:"pointer",fontSize:"12px",fontWeight:"600"}}>⬇️ Export</button>
          )}
          <button onClick={()=>setShowBatch(true)} style={{position:"relative",background:queue.length>0?T.success:T.btnGhost,color:queue.length>0?T.successText:T.btnGhostText,border:"0.5px solid "+(queue.length>0?"rgba(52,199,89,.3)":T.btnGhostBorder),borderRadius:"20px",padding:"6px 14px",cursor:"pointer",fontSize:"12px",fontWeight:queue.length>0?"700":"500",display:"flex",alignItems:"center",gap:"5px"}}>

            postedPlatforms={postedPlatforms}
          />)
        )}
        {activeTab==="posts"&&(withPosts.length===0?<EmptyState icon="✍️" msg="No posts yet" sub='Go to Upcoming and click "Generate Post".'/>:
          withPosts.map(ev=><PostCard key={ev.id} T={T} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]}

        {activeTab==="recap"&&(

                style={{flex:1,minWidth:"200px",background:T.bgCardAlt,border:"0.5px solid "+T.border,borderRadius:"8px",padding:"10px 14px",color:T.text,fontSize:"13px",outline:"none"}}

            {recapError&&<div style={{background:"rgba(127,29,29,.3)",border:"1px solid #F87171",borderRadius:"8px",padding:"12px 16px",color:"#FCA5A5",fontSize:"13px",marginBottom:"16px"}}>❌ {recapError}</div>}

                <div style={{fontWeight:"bold",color:T.gold,fontSize:"14px",marginBottom:"16px"}}>📋 Generated Recap Posts</div>

}

// PREVIEW / CONFIRM MODAL (with editable text + final confirm)
// ═════════════════════════════════════════════════════════════════════════════
function PreviewModal({modal, settings, onClose, onUpdateText, onPosted}) {
  const _pmTheme = localStorage.getItem("sma-theme-v1"); const _pmDark = _pmTheme===null||_pmTheme==="dark"; const T = _pmDark ? DARK : LIGHT;
  const {event, platformKey} = modal;
  const [text, setText] = useState(modal.text);
  const [posted, setPosted] = useState(false);
  const [postNote, setPostNote] = useState("");
  const pCfg = ALL_PLATFORMS.find(p=>p.key===platformKey);
  if(!pCfg) return null;

  const handleTextChange = (val) => {
    setText(val);
    onUpdateText(val);
  };

  const handleConfirm = () => {
    const result = pCfg.postAction(text, settings, event);
    setPostNote(result.note);
    setPosted(true);
    if (onPosted) onPosted(platformKey);
  };

// BATCH CONFIRM MODAL — review + confirm all queued posts at once
// ═════════════════════════════════════════════════════════════════════════════
function BatchConfirmModal({queue, events, settings, onUpdateText, onRemove, onClose, onPosted, toast}) {
  const _bcTheme = localStorage.getItem("sma-theme-v1"); const _bcDark = _bcTheme===null||_bcTheme==="dark"; const T = _bcDark ? DARK : LIGHT;
  const [localQueue, setLocalQueue] = useState(queue.map(q=>({...q})));
  const [posting, setPosting] = useState(false);
  const [results, setResults] = useState({}); // {eventId-platformKey: "done"|"error"}
  const [started, setStarted] = useState(false);

  const updateText = (eventId, platformKey, text) => {
    setLocalQueue(prev => prev.map(q => q.eventId===eventId && q.platformKey===platformKey ? {...q,text} : q));
    onUpdateText(eventId, platformKey, text);
  };

  const remove = (eventId, platformKey) => {
    setLocalQueue(prev => prev.filter(q => !(q.eventId===eventId && q.platformKey===platformKey)));
    onRemove(eventId, platformKey);
  };

  const postAll = async () => {
    setPosting(true);
    setStarted(true);
    const newResults = {};
    for (const item of localQueue) {
      const pCfg = ALL_PLATFORMS.find(p=>p.key===item.platformKey);
      const event = events.find(e=>e.id===item.eventId);
      if (!pCfg) continue;
      try {
        pCfg.postAction(item.text, settings, event);
        newResults[`${item.eventId}-${item.platformKey}`] = "done";
        onPosted(item.eventId, item.platformKey);
      } catch(e) {
        newResults[`${item.eventId}-${item.platformKey}`] = "error";
      }
      setResults({...newResults});
      // Small delay between posts so windows/tabs don't get blocked
      await new Promise(r => setTimeout(r, 600));
    }
    setPosting(false);
  };

  const allDone = started && localQueue.every(q => results[`${q.eventId}-${q.platformKey}`] === "done");

  return (
    <div style={{position:"fixed",inset:0,zIndex:1500,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={e=>{if(e.target===e.currentTarget&&!posting)onClose();}}>
      <div style={{background:T.modalBg,border:"0.5px solid "+T.border,borderRadius:"16px",width:"100%",maxWidth:"680px",maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"modalIn .25s ease",boxShadow:"0 24px 64px rgba(0,0,0,.7)"}}>

        {/* Header */}
        <div style={{padding:"18px 24px",borderBottom:"0.5px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:"bold",color:T.text,fontSize:"16px",fontWeight:"700"}}>🗂️ Post Queue — {localQueue.length} item{localQueue.length!==1?"s":""}</div>
            <div style={{fontSize:"12px",color:T.textSub,marginTop:"3px",lineHeight:"1.6"}}>
              Add posts to the queue from any event card using the <strong style={{color:"#93B4D4"}}>+ Queue</strong> button. Review and edit each post here, then click <strong style={{color:"#93B4D4"}}>Post All</strong> to open them for posting — each platform opens a pre-filled compose window you confirm manually.
            </div>
          </div>
          {!posting&&<button onClick={onClose} style={{background:"transparent",color:T.textSub,border:"none",cursor:"pointer",fontSize:"22px",lineHeight:1}}>×</button>}
        </div>

        {/* Queue items */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:"12px"}}>
          {localQueue.length === 0 && (
            <div style={{textAlign:"center",padding:"40px",color:T.textSub,fontSize:"14px"}}>Queue is empty. Add posts using the "+ Queue" buttons.</div>
          )}
          {localQueue.map((item, i) => {
            const pCfg = ALL_PLATFORMS.find(p=>p.key===item.platformKey);
            const event = events.find(e=>e.id===item.eventId);
            const key = `${item.eventId}-${item.platformKey}`;
            const status = results[key];
            const charOver = item.platformKey==="twitter" && item.text.length > 280;
            return (
              <div key={key} style={{background:`rgba(0,0,0,.3)`,border:`1px solid ${status==="done"?"#4ADE80":status==="error"?"#F87171":(pCfg&&pCfg.color)+"33"}`,borderRadius:"12px",overflow:"hidden"}}>
                {/* Item header */}
                <div style={{padding:"10px 16px",background:(pCfg&&pCfg.color)+"18",display:"flex",alignItems:"center",gap:"10px",borderBottom:`1px solid ${(pCfg&&pCfg.color)}22`}}>
                  <div style={{width:"24px",height:"24px",borderRadius:"6px",background:(pCfg&&pCfg.color),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"11px",flexShrink:0}}>{(pCfg&&pCfg.icon)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"13px",fontWeight:"bold",color:(pCfg&&pCfg.color)}}>{(pCfg&&pCfg.label)}</div>
                    <div style={{fontSize:"11px",color:T.textSub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.eventTitle} · {fmtDate(item.eventDate)}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{fontSize:"11px",color:charOver?"#F87171":item.text.length>(pCfg&&pCfg.charLimit)*0.9?"#FF9500":T.textSub}}>{item.text.length}</span>
                    {status==="done"&&<span style={{fontSize:"13px",color:"#4ADE80"}}>✅ Posted</span>}
                    {status==="error"&&<span style={{fontSize:"13px",color:"#F87171"}}>❌ Error</span>}
                    {!status&&!posting&&<button onClick={()=>remove(item.eventId,item.platformKey)} style={{background:"transparent",color:T.textSub,border:"none",cursor:"pointer",fontSize:"16px",lineHeight:1,padding:"2px"}}>×</button>}
                  </div>
                </div>
                {/* Editable text */}
                {!status&&(
                  <textarea
                    value={item.text}
                    onChange={e=>updateText(item.eventId, item.platformKey, e.target.value)}
                    disabled={posting}
                    rows={4}
                    style={{width:"100%",background:"transparent",border:"none",borderBottom:charOver?`1px solid #F8717133`:"none",color:"#C8D8E8",fontSize:"12px",lineHeight:"1.6",padding:"12px 16px",resize:"vertical",fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif",boxSizing:"border-box",opacity:posting?0.6:1}}
                  />
                )}
                {charOver&&!status&&<div style={{padding:"4px 16px 8px",fontSize:"11px",color:"#F87171"}}>⚠️ Over X/Twitter 280 char limit by {item.text.length-280}</div>}
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{padding:"16px 24px",borderTop:"0.5px solid "+T.border,display:"flex",gap:"10px",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:"12px",color:T.textSub}}>
            {started ? `${Object.values(results).filter(r=>r==="done").length}/${localQueue.length} posted` : `${localQueue.length} post${localQueue.length!==1?"s":""} ready to send`}
          </div>
          <div style={{display:"flex",gap:"10px"}}>
            {!posting&&<button onClick={onClose} style={{background:"transparent",color:T.btnGhostText,border:"0.5px solid "+T.btnGhostBorder,borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px"}}>{allDone?"Close":"Cancel"}</button>}
            {!allDone&&(
              <button onClick={postAll} disabled={posting||localQueue.length===0||localQueue.some(q=>q.platformKey==="twitter"&&q.text.length>280)}
                style={{
                  background:posting||localQueue.length===0?T.btnGhost:`${T.btnPrimary}`,
                  color:posting||localQueue.length===0?T.textSub:"#fff",
                  border:"none",borderRadius:"8px",padding:"9px 28px",
                  cursor:posting||localQueue.length===0?"not-allowed":"pointer",
                  fontSize:"13px",fontWeight:"bold",display:"flex",alignItems:"center",gap:"8px",
                }}>
                {posting ? <><span style={{animation:"pulse 1s infinite"}}>⏳</span> Posting…</> : `🚀 Post All ${localQueue.length > 0 ? `(${localQueue.length})` : ""}`}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


// ── Recap copy button (stateful — shows "Copied!" feedback) ──────────────────
function RecapCopyBtn({text, T}) {
  const [copied, setCopied] = React.useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    }).catch(()=>{
      // fallback for browsers that block clipboard
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    });
  };
  return (
    <button
      onClick={handleCopy}
      style={{
        background: copied ? "#16A34A" : T.bgCardAlt,
        border: "1px solid "+(copied ? "#4ADE80" : T.border),
        borderRadius: "6px",
        padding: "4px 12px",
        cursor: "pointer",
        color: copied ? "#4ADE80" : T.text,
        fontSize: "12px",
        fontWeight: "bold",
        transition: "all .2s",
        position: "relative",
        zIndex: 10,
        userSelect: "none",
        whiteSpace: "nowrap",
      }}
    >
      {copied ? "✅ Copied!" : "📋 Copy"}
    </button>
  );
}

          <div style={{fontSize:"10px",color:T.accent,textTransform:"uppercase",letterSpacing:".08em"}}>{event.date?localDate(event.date).toLocaleDateString("en-US",{month:"short"}):"—"}</div>
          <div style={{fontSize:"22px",fontWeight:"bold",color:(T?T.text:T.text),lineHeight:1}}>{event.date?localDate(event.date).getDate():"—"}</div>

            {post&&<span style={{background:"rgba(0,113,227,.1)",color:T.accent,fontSize:"10px",padding:"2px 8px",borderRadius:"20px"}}>✍️ Posts ready</span>}
            {hasEdits&&<span style={{background:"#F9731622",color:"#F97316",fontSize:"10px",padding:"2px 8px",borderRadius:"4px"}}>● Unsaved edits</span>}
            {event.registration==="Closed"&&<span style={{background:"#7F1D1D22",color:"#F87171",fontSize:"10px",padding:"2px 8px",borderRadius:"4px"}}>🔒 Reg. Closed</span>}
            {event.registration==="Open"&&<span style={{background:"#14532D22",color:"#4ADE80",fontSize:"10px",padding:"2px 8px",borderRadius:"4px"}}>✅ Reg. Open</span>}
          </div>
          <div style={{fontSize:"17px",fontWeight:"bold",color:(T?T.text:T.text),lineHeight:"1.3"}}>{event.title}</div>
          <div style={{fontSize:"12px",color:(T?T.textSub:T.textSub),marginTop:"4px",lineHeight:"1.5"}}>
            {event.starts&&<span>⏰ {event.starts}</span>}
            {event.venue&&<span> · 📍 {event.venue}</span>}

          </div>

          {event.url&&<a href={event.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"11px",color:"#3B82F6",marginTop:"4px",display:"inline-block"}}>🔗 View event →</a>}
        </div>
        {/* Event image thumbnail */}
        <div style={{flexShrink:0,width:"90px",height:"68px",borderRadius:"8px",overflow:"hidden",border:"0.5px solid "+(T?T.border:"rgba(0,0,0,.1)")}}>
            <img src={event.imageUrl} alt={event.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
        {/* Actions */}
        <div style={{display:"flex",flexDirection:"column",gap:"6px",flexShrink:0}}>
          {onGenerate&&<button onClick={()=>onGenerate()} disabled={isGenerating} style={{background:isGenerating?(T?T.btnGhost:"rgba(0,0,0,.05)"):(isPast?(T?T.btnPrimary:"#0071E3"):(T?T.btnGhost:"rgba(0,0,0,.05)")),color:isGenerating?(T?T.textSub:"#6E6E73"):(isPast?(T?T.btnPrimaryText:"#fff"):(T?T.textSub:"#6E6E73")),border:isPast?"none":"0.5px solid "+(T?T.btnGhostBorder:"rgba(0,0,0,.1)"),borderRadius:"8px",padding:"7px 13px",cursor:isGenerating?"not-allowed":"pointer",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap",opacity:isGenerating?0.5:1}}>
            {isGenerating?"⏳ Generating…":post?(isPast?"↺ Re-Recap":"↺ Regenerate"):(isPast?"✦ Generate Recap":"✦ Generate Posts")}
          </button>}
          {post&&<button onClick={onToggle} style={{background:T?T.btnPrimary:"#0071E3",color:T?T.btnPrimaryText:"#fff",border:"none",borderRadius:"8px",padding:"7px 13px",cursor:"pointer",fontSize:"12px",fontWeight:"600"}}>{isExpanded?"▲ Close":"Edit & Post"}</button>}
          
          <button onClick={onDelete} style={{background:"transparent",color:"#7F1D1D",border:"1px solid #3A1A1A",borderRadius:"7px",padding:"7px 10px",cursor:"pointer",fontSize:"12px"}}>🗑️</button>
        </div>
      </div>

        <div style={{borderTop:"0.5px solid "+(T?T.border:"rgba(0,0,0,.1)"),padding:"16px 20px"}}>

          <div style={{borderRadius:"10px",overflow:"hidden",marginBottom:"12px",maxWidth:"260px"}}>
            <img src={event.imageUrl} alt={event.title} style={{width:"100%",height:"auto",objectFit:"cover",display:"block"}}/>
          </div>
          <PostEditor T={T} post={post} editedPost={editedPost} eventId={event.id} event={event} onUpdateText={onUpdateText} onSaveEdits={onSaveEdits} onOpenModal={onOpenModal} onAddToQueue={onAddToQueue} onIsQueued={onIsQueued} activePlatforms={activePlatforms} postedPlatforms={postedPlatforms}/>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// PLATFORM CARD — collapsible per-platform post editor (top-level to preserve focus)
// ═════════════════════════════════════════════════════════════════════════════
function PlatformCard({p, T, externalText, savedText, onUpdateText, onAddToQueue, onIsQueued, onOpenModal, isPosted}) {
  const [collapsed, setCollapsed] = useState(false);
  // Local draft state — changes immediately on each keystroke without re-mounting
  const [draft, setDraft] = useState(externalText);

  // Sync draft when external text changes (e.g. after Generate Posts)
  const prevExternal = React.useRef(externalText);
  useEffect(() => {
    if (externalText !== prevExternal.current) {
      setDraft(externalText);
      prevExternal.current = externalText;
    }
  }, [externalText]);

  const isEdited = draft !== savedText;
  const overLimit = p.charLimit && draft.length > p.charLimit;

  const handleChange = (val) => {
    setDraft(val);
    onUpdateText(val);
  };

  return (
    <div style={{background:T?T.bgCardAlt:T.bgCard,borderRadius:"10px",border:"0.5px solid "+(T?T.border:"rgba(0,0,0,.1)"),overflow:"hidden"}}>
      {/* Platform header — click to collapse */}
      <div
        onClick={()=>setCollapsed(v=>!v)}
        style={{background:T?T.bgCard:"#fff",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:collapsed?"none":"0.5px solid "+(T?T.border:"rgba(0,0,0,.08)"),borderLeft:`3px solid ${p.color}`,cursor:"pointer",userSelect:"none"}}
      >
        <span style={{fontWeight:"bold",fontSize:"13px",color:p.color,display:"flex",alignItems:"center",gap:"6px"}}>
          {p.icon} {p.label}
          <span style={{fontSize:"10px",color:T?T.textSub:"#999",fontWeight:"normal",transition:"transform .2s",display:"inline-block",transform:collapsed?"rotate(-90deg)":"rotate(0deg)"}}>▾</span>
        </span>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}} onClick={e=>e.stopPropagation()}>
          {p.charLimit&&<span style={{fontSize:"11px",color:overLimit?"#F87171":draft.length>p.charLimit*.9?T.textSub:T.text}}>{draft.length}{p.charLimit?`/${p.charLimit}`:""}</span>}
          {isPosted&&<span style={{fontSize:"10px",color:"#30D158",background:"rgba(52,199,89,.1)",padding:"1px 6px",borderRadius:"4px"}}>✓ Posted</span>}
            {!isPosted&&isEdited&&<span style={{fontSize:"10px",color:"#F97316",background:"#F9731622",padding:"1px 6px",borderRadius:"4px"}}>edited</span>}
          <button
            onClick={onAddToQueue}
            title={onIsQueued() ? "Already in queue — click to update" : "Add to batch queue"}
            style={{
              background: onIsQueued() ? (T?T.success:"rgba(52,199,89,.1)") : (T?T.btnGhost:"rgba(0,0,0,.05)"),
              color: onIsQueued() ? (T?T.successText:"#1D7A3A") : (T?T.textSub:"#6E6E73"),
              border:"0.5px solid "+(onIsQueued() ? "rgba(52,199,89,.3)" : (T?T.btnGhostBorder:"rgba(0,0,0,.1)")),
              borderRadius:"6px",padding:"5px 10px",cursor:"pointer",
              fontSize:"12px",fontWeight:"600",display:"flex",alignItems:"center",gap:"4px",
            }}
          >
            {onIsQueued() ? "✓ Queued" : "+ Queue"}
          </button>
          <button
            onClick={onOpenModal}
            style={{background:p.color,color:"#fff",border:"none",borderRadius:"6px",padding:"5px 12px",cursor:"pointer",fontSize:"12px",fontWeight:"600",display:"flex",alignItems:"center",gap:"4px"}}
          >
            {p.icon} Post Now
          </button>
        </div>
      </div>
      {/* Collapsible body */}
      {!collapsed&&(
        <>
          <textarea
            value={draft}
            onChange={e=>{ if(!isPosted) handleChange(e.target.value); }}
            readOnly={isPosted}
            style={{
              width:"100%",boxSizing:"border-box",
              minHeight:p.key==="twitter"?"80px":"120px",
              background:isPosted?(T?"rgba(52,199,89,.05)":"rgba(52,199,89,.05)"):"transparent",
              border:"none",
              color:isPosted?(T?T.textSub:"#999"):(T?T.text:"#1D1D1F"),
              fontSize:"13px",lineHeight:"1.7",
              padding:"12px 14px",resize:isPosted?"none":"vertical",
              fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif",
              cursor:isPosted?"default":"text",
              opacity:isPosted?0.75:1,
            }}
          />
          {overLimit&&<div style={{padding:"4px 14px 8px",fontSize:"11px",color:"#F87171"}}>⚠️ Over {p.label} character limit by {draft.length-p.charLimit} chars</div>}
        </>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// POST EDITOR — editable textareas + Post buttons per platform
// ══════════════════════════════════════════════════════════════════════════════════════
function PostEditor({T,post, editedPost, eventId, event, onUpdateText, onSaveEdits, onOpenModal, onAddToQueue, onIsQueued, activePlatforms, postedPlatforms}) {
  const [dirty, setDirty] = useState(false);

  const handleChange = (pKey, val) => {
    onUpdateText(pKey, val);
    setDirty(true);
  };


  const handleSave = () => {
    onSaveEdits();
    setDirty(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      {(activePlatforms||ALL_PLATFORMS).map(p=>{
        const savedText = post[p.key] || "";
        const externalText = (editedPost && editedPost[p.key] !== undefined) ? editedPost[p.key] : savedText;
        return (
          <PlatformCard key={p.key} p={p} T={T}
            externalText={externalText}
            savedText={savedText}
            onUpdateText={(val)=>handleChange(p.key,val)}
            onAddToQueue={()=>onAddToQueue&&onAddToQueue(p.key)}
            onIsQueued={()=>onIsQueued&&onIsQueued(p.key)}
            onOpenModal={()=>onOpenModal(p.key)}
            isPosted={!!(postedPlatforms&&postedPlatforms[eventId+":"+p.key])}
          />
        );
      })}
      {/* Save edits button */}
      {dirty&&(
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={handleSave} style={{background:T?T.btnPrimary:"#0071E3",color:T?T.btnPrimaryText:"#fff",border:"none",borderRadius:"8px",padding:"8px 20px",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>
            💾 Save Edits
          </button>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// PROMPT MODAL — custom guidance input before generating posts
// ═════════════════════════════════════════════════════════════════════════════
function PromptModal({T, isPast, isRecap, onConfirm, onCancel}) {
  const [txt, setTxt] = React.useState("");
  const inputRef = React.useRef(null);
  useEffect(()=>{ if(inputRef.current) inputRef.current.focus(); },[]);

  const title   = isRecap  ? "Generate Recap"
                : isPast   ? "Generate Recap Posts"
                :            "Generate Posts";
  const context = isRecap  ? "recap posts for this past event"
                : isPast   ? "past-tense recap posts for this event"
                :            "upcoming event posts";

  const examples = isRecap||isPast
    ? ["Thank [name] for their amazing talk", "Highlight the networking that happened", "Celebratory and fun with an Aussie flavour", "Serious and professional tone"]
    : ["Focus on the networking opportunity", "Mention the venue has great food", "Fun with an Aussie theme 🦘", "Formal and professional tone"];

  const handleKey = (e) => {
    if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); onConfirm(txt.trim()); }
    if (e.key==="Escape") onCancel();
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}
      onClick={(e)=>{ if(e.target===e.currentTarget) onCancel(); }}>
      <div style={{background:T?T.modalBg:"#fff",borderRadius:"16px",width:"100%",maxWidth:"520px",boxShadow:"0 20px 60px rgba(0,0,0,.3)",border:"0.5px solid "+(T?T.border:"rgba(0,0,0,.1)")}}>
        {/* Header */}
        <div style={{padding:"18px 20px 12px",borderBottom:"0.5px solid "+(T?T.border:"rgba(0,0,0,.08)")}}>
          <div style={{fontSize:"16px",fontWeight:"700",color:T?T.text:"#1D1D1F"}}>{title}</div>
          <div style={{fontSize:"12px",color:T?T.textSub:"#6E6E73",marginTop:"3px"}}>Add optional guidance to personalise your {context}. Leave blank for the default style.</div>
        </div>
        {/* Input area */}
        <div style={{padding:"16px 20px"}}>
          <textarea
            ref={inputRef}
            value={txt}
            onChange={e=>setTxt(e.target.value)}
            onKeyDown={handleKey}
            placeholder={"e.g. " + examples[0]}
            rows={3}
            style={{width:"100%",boxSizing:"border-box",background:T?T.bgCardAlt:"#f5f5f5",border:"0.5px solid "+(T?T.border:"rgba(0,0,0,.15)"),borderRadius:"10px",padding:"12px 14px",fontSize:"14px",color:T?T.text:"#1D1D1F",resize:"none",fontFamily:"inherit",outline:"none",lineHeight:"1.6"}}
          />
          {/* Example chips */}
          <div style={{marginTop:"10px"}}>
            <div style={{fontSize:"11px",color:T?T.textSub:"#999",marginBottom:"6px",textTransform:"uppercase",letterSpacing:".06em"}}>Quick ideas — click to use:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {examples.map(ex=>(
                <button key={ex} onClick={()=>setTxt(ex)}
                  style={{fontSize:"11px",padding:"4px 10px",borderRadius:"20px",border:"0.5px solid "+(T?T.border:"rgba(0,0,0,.15)"),background:T?T.bgCard:"#fff",color:T?T.textSub:"#555",cursor:"pointer",whiteSpace:"nowrap"}}>
                  {ex}
                </button>
              ))}
            </div>
          </div>
        </div>
        {/* Footer */}
        <div style={{padding:"12px 20px 18px",display:"flex",gap:"10px",justifyContent:"flex-end",borderTop:"0.5px solid "+(T?T.border:"rgba(0,0,0,.08)")}}>
          <button onClick={onCancel}
            style={{background:"transparent",color:T?T.textSub:"#6E6E73",border:"0.5px solid "+(T?T.btnGhostBorder:"rgba(0,0,0,.15)"),borderRadius:"8px",padding:"9px 18px",cursor:"pointer",fontSize:"13px"}}>
            Cancel
          </button>
          <button onClick={()=>onConfirm(txt.trim())}
            style={{background:T?T.btnPrimary:"#0071E3",color:T?T.btnPrimaryText:"#fff",border:"none",borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>
            {txt.trim() ? "✦ Generate with guidance" : "✦ Generate (default)"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// EXPORT MODAL
// ═════════════════════════════════════════════════════════════════════════════
function ExportModal({events, posts, editedPosts, onClose, toast, activePlatforms}) {
  const _emTheme = localStorage.getItem("sma-theme-v1"); const _emDark = _emTheme===null||_emTheme==="dark"; const T = _emDark ? DARK : LIGHT;
  const eventsWithPosts = events.filter(e => posts[e.id]);
  const [selected, setSelected] = useState(new Set(eventsWithPosts.map(e=>e.id)));
  const [fmt, setFmt] = useState("md");
  const [exporting, setExporting] = useState(false);

  const toggle = (id) => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };
  const toggleAll = () => {
    if (selected.size === eventsWithPosts.length) setSelected(new Set());
    else setSelected(new Set(eventsWithPosts.map(e=>e.id)));
  };

  const doExport = () => {
    const toExport = eventsWithPosts.filter(e=>selected.has(e.id));
    if (!toExport.length) { toast("No events selected","err"); return; }
    try {
      if (fmt==="md")  exportMarkdown(toExport, posts, editedPosts);
      if (fmt==="csv") exportCSV(toExport, posts, editedPosts);
      if (fmt==="txt") exportTxt(toExport, posts, editedPosts);
      toast(`✅ ${toExport.length} event(s) exported as .${fmt}`);
      onClose();
    } catch(e) { toast("Export error: "+e.message,"err"); }
  };

  const FMT_INFO = {
    md:  {icon:"📝", label:"Markdown (.md)",  desc:"Best for Notion, Obsidian, or GitHub. Readable with headings & formatting."},
    csv: {icon:"📊", label:"Spreadsheet (.csv)", desc:"Opens in Excel or Google Sheets. One row per platform per event."},
    txt: {icon:"📄", label:"Plain Text (.txt)", desc:"Universal. Works in any text editor. Clean section breaks."},
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:1500,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:T.modalBg,border:"0.5px solid "+T.border,borderRadius:"16px",width:"100%",maxWidth:"520px",maxHeight:"90vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"modalIn .25s ease",boxShadow:"0 24px 64px rgba(0,0,0,.7)"}}>
        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"0.5px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between",background:T.bgCard}}>
          <div>
            <div style={{fontWeight:"bold",color:T.text,fontSize:"15px",fontWeight:"700"}}>⬇️ Export Posts</div>
            <div style={{fontSize:"12px",color:T.textSub,marginTop:"2px"}}>Download to your computer — save anywhere you like</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",color:T.textSub,border:"none",cursor:"pointer",fontSize:"20px",lineHeight:1,padding:"4px"}}>×</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"20px",display:"flex",flexDirection:"column",gap:"20px"}}>
          {/* Format picker */}
          <div>
            <div style={{fontSize:"12px",color:T.textSub,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>Format</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {Object.entries(FMT_INFO).map(([key,info])=>(
                <label key={key} onClick={()=>setFmt(key)} style={{display:"flex",alignItems:"flex-start",gap:"12px",padding:"12px 14px",background:fmt===key?"rgba(0,48,143,.4)":"rgba(0,0,0,.2)",border:`1px solid ${fmt===key?T.accent:T.border}`,borderRadius:"10px",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:"18px",height:"18px",borderRadius:"50%",border:"2px solid "+(fmt===key?"#3B82F6":T.border),background:fmt===key?"#3B82F6":"transparent",flexShrink:0,marginTop:"1px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {fmt===key&&<div style={{width:"7px",height:"7px",borderRadius:"50%",background:"#fff"}}/>}
                  </div>
                  <div>
                    <div style={{fontSize:"14px",color:T.text,fontWeight:fmt===key?"bold":"normal"}}>{info.icon} {info.label}</div>
                    <div style={{fontSize:"12px",color:T.textSub,marginTop:"3px"}}>{info.desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>

          {/* Event selector */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{fontSize:"12px",color:T.textSub,textTransform:"uppercase",letterSpacing:"1px"}}>Events ({selected.size}/{eventsWithPosts.length} selected)</div>
              <button onClick={toggleAll} style={{background:"transparent",color:"#3B82F6",border:"none",cursor:"pointer",fontSize:"12px",textDecoration:"underline"}}>
                {selected.size===eventsWithPosts.length?"Deselect all":"Select all"}
              </button>
            </div>
            {eventsWithPosts.length===0 ? (
              <div style={{color:T.textSub,fontSize:"13px",fontStyle:"italic"}}>No posts generated yet.</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {eventsWithPosts.map(ev=>(
                  <label key={ev.id} onClick={()=>toggle(ev.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:selected.has(ev.id)?"rgba(0,48,143,.25)":"rgba(0,0,0,.2)",border:"0.5px solid "+T.border,borderRadius:"8px",cursor:"pointer"}}>
                    <div style={{width:"16px",height:"16px",borderRadius:"3px",border:"2px solid "+(selected.has(ev.id)?"#3B82F6":T.border),background:selected.has(ev.id)?"#3B82F6":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {selected.has(ev.id)&&<span style={{color:"#fff",fontSize:"10px",lineHeight:1}}>✓</span>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"13px",color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                      <div style={{fontSize:"11px",color:T.textSub}}>{fmtDate(ev.date)}</div>
                    </div>
                    <div style={{fontSize:"11px",color:"#4ADE80",flexShrink:0}}>
                      {(activePlatforms||ALL_PLATFORMS).filter(p=>(posts[ev.id]&&posts[ev.id][p.key])).length} platforms
                    </div>
                  </label>
                ))}
              </div>
            )}
          </div>

          {/* Tip */}
          <div style={{background:"rgba(0,113,227,.06)",border:"0.5px solid rgba(0,113,227,.15)",borderRadius:"8px",padding:"12px 14px",fontSize:"12px",color:"#A89060",lineHeight:"1.6"}}>
            💡 <strong style={{color:T.accent}}>Tip:</strong> Set Chrome's default download folder to save straight to a specific desktop folder — Chrome → Settings → Downloads → Change location.
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"16px 20px",borderTop:"0.5px solid "+T.border,display:"flex",gap:"10px",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:"transparent",color:T.btnGhostText,border:"0.5px solid "+T.btnGhostBorder,borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px"}}>Cancel</button>
          <button onClick={doExport} disabled={selected.size===0} style={{background:selected.size===0?T.btnGhost:T.btnPrimary,color:selected.size===0?T.textSub:T.btnPrimaryText,border:"none",borderRadius:"8px",padding:"9px 22px",cursor:selected.size===0?"not-allowed":"pointer",fontSize:"13px",fontWeight:"bold"}}>
            {exporting ? <span style={{animation:"pulse 1s infinite"}}>⏳ Fetching images…</span> : `⬇️ Download ${selected.size > 0 ? `(${selected.size} event${selected.size>1?"s":""})` : ""}`}
          </button>
        </div>
      </div>
    </div>
  );
}
