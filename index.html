    get:(key)=>{try{const v=localStorage.getItem(key);return Promise.resolve(v?{key,value:v}:null);}catch(e){return Promise.resolve(null);}},
    set:(key,value)=>{try{localStorage.setItem(key,String(value));return Promise.resolve({key,value});}catch(e){return Promise.resolve(null);}},
    delete:(key)=>{try{localStorage.removeItem(key);return Promise.resolve({key,deleted:true});}catch(e){return Promise.resolve(null);}},
    list:(prefix)=>{try{const keys=Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix));return Promise.resolve({keys});}catch(e){return Promise.resolve({keys:[]});}}
  };

// ── Helpers ───────────────────────────────────────────────────────────────────
function localDate(str) {
  if (!str) return null;
  const iso = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return new Date(Number(iso[1]), Number(iso[2])-1, Number(iso[3]), 12, 0, 0);
  return new Date(str);
}
const fmtDate = d => { if(!d) return ""; const x=localDate(d); return (x&&!isNaN(x)) ? x.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"}) : ""; };
const isFuture = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c>=TODAY; };
const isPastDate = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c<TODAY; };

function parseDate(s) {
  if (!s) return null;
  const m = s.match(/(\w{3}\s+\w{3}\s+\d+\s+\d{4})/);
  if (m) { const d=new Date(m[1]); if(!isNaN(d)) return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  const iso = s.match(/^(\d{4}-\d{2}-\d{2})/);
  if (iso) return iso[1];
  const d2=new Date(s); return isNaN(d2)?null:d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");
}
function parseType(t) {
  if (!t) return "Other"; const s=t.toLowerCase();
  if (s.includes("sundowner")) return "Sundowner";
  if (s.includes("gala"))      return "Gala";
  if (s.includes("conference")||s.includes("ausii")) return "Conference";
  if (s.includes("coffee")||s.includes("monday")||s.includes("network")||s.includes("multinational")) return "Networking";
  if (s.includes("anzac")||s.includes("remembrance")) return "Cultural";
  return "Other";
}

async function callClaude(messages, system, settings) {
  const apiKey=(settings?.useSharedKey?settings?.sharedApiKey:settings?.apiKey)||window.ANTHROPIC_API_KEY||localStorage.getItem("aacc-api-key")||"";
  if (!apiKey) throw new Error("NO_API_KEY");
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system,messages})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||"API error "+r.status);}
  return r.json();
}

function GS({T}) {
  return <style>{`
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;background:${T.bg};transition:background .3s;}
    ::selection{background:${T.accent}33;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes modalIn{from{opacity:0;transform:scale(.96)translateY(8px)}to{opacity:1;transform:scale(1)translateY(0)}}
    textarea:focus,input:focus{outline:2px solid ${T.borderFocus}!important;outline-offset:-1px;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px;}
    .card-enter{animation:fadeUp .22s ease both;}
    .modal-enter{animation:modalIn .22s ease both;}
  `}</style>;
}

// Card
function Card({children, style={}, onClick, padding="16px"}) {
  const T=useT();
  return <div onClick={onClick} style={{background:T.bgCard,borderRadius:"16px",border:`1px solid ${T.border}`,boxShadow:T.shadow,overflow:"hidden",padding,...style}}>{children}</div>;
}

// Pressable icon button (nav bar)
function IconBtn({onClick, title, badge, children}) {
  const T=useT();
  const [hover,setHover]=useState(false);
  return (
    <button onClick={onClick} title={title} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{position:"relative",background:hover?T.bgCardAlt:"transparent",border:"none",cursor:"pointer",color:T.textSub,padding:"8px",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
      {children}
      {badge>0&&<span style={{position:"absolute",top:"3px",right:"3px",background:T.success,color:"#fff",borderRadius:"10px",fontSize:"9px",fontWeight:"700",minWidth:"15px",height:"15px",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",lineHeight:1}}>{badge}</span>}
    </button>
  );
}

// Primary / secondary / ghost / danger button
function Btn({onClick,disabled,children,variant="primary",style={},small=false}) {
  const T=useT();
  const [hover,setHover]=useState(false);
  const pad=small?"6px 12px":"10px 18px";
  const fs=small?"13px":"14px";
  const styles={
    primary:{background:disabled?T.border:hover?T.accent+"dd":T.accent,color:disabled?T.textMuted:"#fff"},
    secondary:{background:hover?T.bgCardAlt:T.bgCardAlt,color:T.text,border:`1px solid ${T.border}`},
    ghost:{background:"transparent",color:hover?T.text:T.accent,padding:pad},
    danger:{background:hover?T.danger+"28":T.danger+"18",color:T.danger},
    success:{background:hover?T.success+"28":T.success+"18",color:T.success},
  };
  return (
    <button onClick={disabled?undefined:onClick} disabled={disabled} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{border:"none",borderRadius:"10px",padding:pad,cursor:disabled?"not-allowed":"pointer",fontSize:fs,fontWeight:"600",transition:"all .15s",display:"inline-flex",alignItems:"center",gap:"6px",opacity:disabled?.5:1,...styles[variant],...style}}>
      {children}
    </button>
  );
}

// Divider
function Div() { const T=useT(); return <div style={{height:"1px",background:T.border}}/>; }

// Toast notification
function Toast({notif}) {
  const T=useT();
  if (!notif) return null;
  const bg=notif.type==="err"?T.danger:T.success;
  return (
    <div style={{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"11px 20px",borderRadius:"14px",fontSize:"14px",fontWeight:"600",zIndex:9999,boxShadow:T.shadowLg,animation:"fadeUp .2s ease",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}}>
      {notif.msg}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// SETTINGS PAGE
// ═════════════════════════════════════════════════════════════════════════════
function SettingsPage({settings,onSave,onClose,isFirstRun,isDark,onToggleTheme}) {
  const T=useT();
  const [local,setLocal]=useState({...DEFAULT_SETTINGS,...settings});
  const [saved,setSaved]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const set=(k,v)=>setLocal(p=>({...p,[k]:v}));
  const setPlatform=(k,v)=>setLocal(p=>({...p,platforms:{...p.platforms,[k]:v}}));
  const hasKey=local.useSharedKey?!!local.sharedApiKey.trim():!!local.apiKey.trim();
  const activeCnt=Object.values(local.platforms).filter(Boolean).length;
  const canSave=hasKey&&activeCnt>=1;
  const handleSave=()=>{
    onSave({...local,setupComplete:canSave});
    setSaved(true);
    setTimeout(()=>{setSaved(false);if(onClose)onClose();},900);
  };
  const PLATS=[
    {key:"linkedin", label:"LinkedIn",     color:"#0A66C2",desc:"Copy & paste workflow"},
    {key:"twitter",  label:"X / Twitter",  color:"#000000",desc:"Pre-filled intent link"},
    {key:"facebook", label:"Facebook",     color:"#1877F2",desc:"Copy & paste workflow"},
    {key:"instagram",label:"Instagram",    color:"#E1306C",desc:"Copy & paste or Creator Studio"},
    {key:"email",    label:"Email",        color:"#34C759",desc:"Opens your email client"},
    {key:"file",     label:"Save as File", color:"#BF5AF2",desc:"Downloads a Markdown file"},
  ];
  const iS={width:"100%",padding:"11px 14px",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:"10px",color:T.text,fontSize:"14px",fontFamily:"inherit",boxSizing:"border-box"};
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"-apple-system,'SF Pro Display','Helvetica Neue',sans-serif",paddingBottom:"60px"}}>
      {/* Nav */}
      <div style={{position:"sticky",top:0,zIndex:100,backdropFilter:T.blur,WebkitBackdropFilter:T.blur,background:T.bgHeader,borderBottom:`1px solid ${T.border}`,height:"52px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}}>
        <div style={{fontWeight:"700",fontSize:"17px",color:T.text}}>Settings</div>
        <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
          <IconBtn onClick={onToggleTheme} title={isDark?"Light mode":"Dark mode"}>{isDark?<SunIcon/>:<MoonIcon/>}</IconBtn>
          {!isFirstRun&&onClose&&<Btn onClick={onClose} variant="ghost">Done</Btn>}
        </div>
      </div>
      <div style={{maxWidth:"560px",margin:"0 auto",padding:"4px 20px 40px"}}>
        {isFirstRun&&(
          <div style={{background:T.accentSoft,border:`1px solid ${T.accent}33`,borderRadius:"14px",padding:"14px 16px",margin:"16px 0",fontSize:"14px",color:T.accent,lineHeight:"1.6"}}>
            👋 <strong>Welcome!</strong> Add your API key and choose platforms to get started.
          </div>
        )}

        {/* API KEY */}
        <SL>API Key</SL>
        <Card padding="0">
          <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
            <div><div style={{fontSize:"15px",fontWeight:"500",color:T.text}}>Personal key</div><div style={{fontSize:"12px",color:T.textMuted,marginTop:"2px"}}>You pay per generation (~$0.01–0.02)</div></div>
            <Toggle checked={!local.useSharedKey} onChange={()=>set("useSharedKey",false)}/>
          </div>
          {!local.useSharedKey&&<><Div/><div style={{padding:"12px 16px"}}>
            <div style={{position:"relative"}}>
              <input type={showKey?"text":"password"} value={local.apiKey} onChange={e=>set("apiKey",e.target.value)} placeholder="sk-ant-api03-…" style={iS}/>
              <button onClick={()=>setShowKey(s=>!s)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",padding:"4px",color:T.textMuted}}>{showKey?"🙈":"👁️"}</button>
            </div>
            {!local.apiKey&&<div style={{fontSize:"12px",color:T.textMuted,marginTop:"8px"}}>Get yours at <a href="https://platform.claude.com/settings/keys" target="_blank" rel="noopener noreferrer" style={{color:T.accent}}>platform.claude.com</a></div>}
          </div></>}
          <Div/>
          <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
            <div><div style={{fontSize:"15px",fontWeight:"500",color:T.text}}>Shared key</div><div style={{fontSize:"12px",color:T.textMuted,marginTop:"2px"}}>Admin-provided — they pay</div></div>
            <Toggle checked={local.useSharedKey} onChange={()=>set("useSharedKey",true)}/>
          </div>
          {local.useSharedKey&&<><Div/><div style={{padding:"12px 16px"}}>
            <div style={{position:"relative"}}>
              <input type={showKey?"text":"password"} value={local.sharedApiKey} onChange={e=>set("sharedApiKey",e.target.value)} placeholder="sk-ant-api03-…" style={iS}/>
              <button onClick={()=>setShowKey(s=>!s)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",padding:"4px",color:T.textMuted}}>{showKey?"🙈":"👁️"}</button>
            </div>
          </div></>}
        </Card>

        {/* EVENT SOURCE */}
        <SL>Event Source URL</SL>
        <Card padding="0">
          <div style={{padding:"12px 16px"}}>
            <input type="url" value={local.eventSourceUrl} onChange={e=>set("eventSourceUrl",e.target.value)} placeholder="https://yourorg.com/events" style={{...iS,fontFamily:"monospace",fontSize:"12px"}}/>
            <div style={{fontSize:"12px",color:T.textMuted,marginTop:"8px"}}>Used by Auto Scan. For JavaScript-rendered sites use the Console Script.</div>
          </div>
        </Card>

        {/* PLATFORMS */}
        <SL>Platforms <span style={{textTransform:"none",fontSize:"12px",fontWeight:"400",letterSpacing:0,color:T.textMuted}}>— pick at least one</span></SL>
        <Card padding="0">
          {PLATS.map((p,i)=>(
            <React.Fragment key={p.key}>
              {i>0&&<Div/>}
              <label style={{display:"flex",alignItems:"center",gap:"12px",padding:"13px 16px",cursor:"pointer"}}>
                <div style={{width:"34px",height:"34px",borderRadius:"8px",background:p.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700",fontSize:"13px",flexShrink:0,letterSpacing:"-0.5px"}}>{p.label.substring(0,2)}</div>
                <div style={{flex:1}}><div style={{fontSize:"15px",fontWeight:"500",color:T.text}}>{p.label}</div><div style={{fontSize:"12px",color:T.textMuted}}>{p.desc}</div></div>
                <div onClick={()=>setPlatform(p.key,!local.platforms[p.key])} style={{width:"22px",height:"22px",borderRadius:"6px",border:`2px solid ${local.platforms[p.key]?p.color:T.border}`,background:local.platforms[p.key]?p.color:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",cursor:"pointer"}}>
                  {local.platforms[p.key]&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
              </label>
            </React.Fragment>
          ))}
        </Card>
        {local.platforms.email&&<><SL>Email Recipient <span style={{textTransform:"none",fontSize:"12px",fontWeight:"400",letterSpacing:0,color:T.textMuted}}>— optional</span></SL>
          <Card padding="12px 16px"><input type="email" value={local.emailTo} onChange={e=>set("emailTo",e.target.value)} placeholder="team@yourorg.com" style={iS}/></Card>
        </>}

        {/* APPEARANCE */}
        <SL>Appearance</SL>
        <Card padding="0">
          <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:"15px",fontWeight:"500",color:T.text}}>Dark Mode</div>
            <Toggle checked={isDark} onChange={onToggleTheme}/>
          </div>
        </Card>

        {/* ABOUT */}
        <SL>About</SL>
        <Card padding="0">
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"15px",color:T.text}}>Created by</span><span style={{fontSize:"15px",color:T.textSub}}>AndyCon · March 2026</span></div>
          <Div/>
          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"15px",color:T.text}}>Feedback</span><a href="mailto:andycon@gmail.com" style={{fontSize:"15px",color:T.accent,textDecoration:"none"}}>andycon@gmail.com</a></div>
        </Card>

        {/* SAVE */}
        <div style={{marginTop:"28px",display:"flex",flexDirection:"column",alignItems:"center",gap:"10px"}}>
          {!canSave&&<div style={{fontSize:"13px",color:T.danger,textAlign:"center"}}>{!hasKey?"Add an API key to continue":"Select at least one platform"}</div>}
          <button onClick={handleSave} disabled={!canSave} style={{width:"100%",maxWidth:"340px",padding:"16px",borderRadius:"14px",border:"none",cursor:canSave?"pointer":"not-allowed",fontSize:"16px",fontWeight:"700",background:canSave?T.accent:T.border,color:canSave?"#fff":T.textMuted,transition:"all .2s",boxShadow:canSave?T.shadowLg:"none"}}>
            {saved?"✓ Saved":isFirstRun?"Get Started":"Save Settings"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// PAST EVENT PANEL
// ═════════════════════════════════════════════════════════════════════════════
function PastEventPanel({pastUrl,setPastUrl,pastComment,setPastComment,pastFetching,pastEvent,pastPosts,activePlatforms,onGenerate,onOpenModal,onAddToQueue}) {
  const T=useT();
  const [open,setOpen]=useState(false);
  const [editedPP,setEditedPP]=useState({});
  React.useEffect(()=>{ setEditedPP({}); },[pastPosts]);
  const getText=k=>editedPP[k]!==undefined?editedPP[k]:(pastPosts?.[k]||"");
  return (
    <div className="card-enter" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:"16px",marginBottom:"12px",overflow:"hidden",boxShadow:T.shadow}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}}>
        <div style={{width:"36px",height:"36px",borderRadius:"10px",background:T.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>🔗</div>
        <div style={{flex:1}}>
          <div style={{fontSize:"15px",fontWeight:"600",color:T.text}}>Post from a Past Event URL</div>
          <div style={{fontSize:"12px",color:T.textMuted,marginTop:"1px"}}>Paste any event link — generate ready-to-post content</div>
        </div>
        <div style={{color:T.textMuted,fontSize:"13px",transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}>▼</div>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${T.border}`,padding:"16px"}}>
          {/* URL */}
          <div style={{fontSize:"12px",fontWeight:"600",color:T.textMuted,textTransform:"uppercase",letterSpacing:"0.7px",marginBottom:"6px"}}>Event Page URL</div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"14px"}}>
            <input type="url" value={pastUrl} onChange={e=>setPastUrl(e.target.value)} placeholder="https://example.com/events/my-event"
              style={{flex:1,minWidth:"200px",padding:"10px 14px",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:"10px",color:T.text,fontSize:"13px",fontFamily:"monospace"}}/>
            <Btn onClick={onGenerate} disabled={pastFetching||!pastUrl.trim()} variant={pastFetching||!pastUrl.trim()?"secondary":"primary"}>
              {pastFetching?<span style={{animation:"pulse 1s infinite"}}>Fetching…</span>:"✨ Generate Posts"}
            </Btn>
          </div>
          {/* Comment */}
          <div style={{fontSize:"12px",fontWeight:"600",color:T.textMuted,textTransform:"uppercase",letterSpacing:"0.7px",marginBottom:"6px"}}>Your Comments <span style={{textTransform:"none",fontWeight:"400",fontSize:"11px"}}>— tone, highlights, hashtags</span></div>
          <textarea value={pastComment} onChange={e=>setPastComment(e.target.value)} rows={3}
            placeholder="Great turnout! The keynote was inspiring. #Innovation #Houston"
            style={{width:"100%",padding:"10px 14px",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:"10px",color:T.text,fontSize:"13px",fontFamily:"inherit",resize:"vertical",lineHeight:"1.6",marginBottom:"14px"}}/>
          {/* Results */}
          {pastEvent&&pastPosts&&(
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:"14px"}}>
              <div style={{display:"flex",gap:"12px",marginBottom:"14px",flexWrap:"wrap"}}>
                {pastEvent.imageUrl&&<div style={{flexShrink:0}}>
                  <img src={pastEvent.imageUrl} alt={pastEvent.title} style={{width:"100px",height:"70px",objectFit:"cover",borderRadius:"10px",border:`1px solid ${T.border}`,display:"block"}}/>
                  <a href={pastEvent.imageUrl} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",marginTop:"4px",fontSize:"11px",color:T.accent,textDecoration:"none"}}>⬇ Save Image</a>
                </div>}
                <div style={{flex:1,minWidth:"140px"}}>
                  <div style={{fontSize:"16px",fontWeight:"600",color:T.text,marginBottom:"3px"}}>{pastEvent.title}</div>
                  {pastEvent.date&&<div style={{fontSize:"12px",color:T.textMuted}}>{pastEvent.date}</div>}
                  {pastEvent.venue&&<div style={{fontSize:"12px",color:T.textMuted}}>{pastEvent.venue}</div>}
                  <a href={pastEvent.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"12px",color:T.accent,textDecoration:"none"}}>View original →</a>
                </div>
              </div>
              {activePlatforms.map(p=>{
                const txt=getText(p.key); if(!txt) return null;
                const over=p.key==="twitter"&&txt.length>280;
                return (
                  <div key={p.key} style={{background:T.bgCardAlt,borderRadius:"12px",marginBottom:"8px",overflow:"hidden",border:`1px solid ${T.border}`}}>
                    <div style={{padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgCard}}>
                      <span style={{fontWeight:"600",fontSize:"13px",color:p.color}}>{p.label}</span>
                      <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                        <span style={{fontSize:"11px",color:over?T.danger:T.textMuted}}>{txt.length}</span>
                        <Btn onClick={()=>onAddToQueue(pastEvent,p.key)} variant="secondary" small>+ Queue</Btn>
                        <Btn onClick={()=>onOpenModal(pastEvent,p.key)} variant="primary" small style={{background:p.color}}>Post</Btn>
                      </div>
                    </div>
                    <textarea value={txt} onChange={e=>setEditedPP(prev=>({...prev,[p.key]:e.target.value}))} rows={p.key==="twitter"?3:4}
                      style={{width:"100%",background:"transparent",border:"none",color:T.text,fontSize:"13px",lineHeight:"1.7",padding:"10px 14px",resize:"vertical",fontFamily:"inherit"}}/>
                    {over&&<div style={{padding:"2px 12px 8px",fontSize:"11px",color:T.danger}}>Over 280 by {txt.length-280} chars</div>}
                  </div>
                );
              })}
              <div style={{marginTop:"10px",padding:"10px 14px",background:T.accentSoft,borderRadius:"10px",fontSize:"12px",color:T.textSub,lineHeight:"1.7"}}>
                💡 <strong style={{color:T.accent}}>Tip:</strong> Save the event image first (⬇ Save Image), then use Post to open the platform with text already copied.
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// POST EDITOR (platform posts)
// ═════════════════════════════════════════════════════════════════════════════
function PostEditor({post,editedPost,event,onUpdateText,onSaveEdits,onOpenModal,onAddToQueue,onIsQueued,activePlatforms}) {
  const T=useT();
  const [dirty,setDirty]=useState(false);
  const platforms=activePlatforms||ALL_PLATFORMS;
  const handleChange=(pKey,val)=>{ onUpdateText(pKey,val); setDirty(true); };
  const handleSave=()=>{ onSaveEdits(); setDirty(false); };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
      {platforms.map(p=>{
        const currentText=(editedPost?.[p.key])||post?.[p.key]||"";
        if(!currentText) return null;
        const over=p.charLimit&&currentText.length>p.charLimit;
        const queued=onIsQueued&&onIsQueued(p.key);
        return (
          <div key={p.key} style={{borderRadius:"12px",overflow:"hidden",border:`1px solid ${T.border}`,background:T.bgCardAlt}}>
            <div style={{padding:"8px 12px",background:T.bgCard,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:"600",fontSize:"13px",color:p.color}}>{p.label}</span>
              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                <span style={{fontSize:"11px",color:over?T.danger:currentText.length>p.charLimit*.88?T.gold:T.textMuted}}>{currentText.length}{p.charLimit<999999?`/${p.charLimit}`:""}</span>
                <Btn onClick={()=>{ if(onAddToQueue) onAddToQueue(p.key); }} variant={queued?"success":"secondary"} small>{queued?"✓ Queued":"+ Queue"}</Btn>
                <Btn onClick={()=>onOpenModal(p.key)} variant="primary" small style={{background:p.color}}>Post</Btn>
              </div>
            </div>
            <textarea value={currentText} onChange={e=>handleChange(p.key,e.target.value)} rows={p.key==="twitter"?3:5}
              style={{width:"100%",background:"transparent",border:"none",color:T.text,fontSize:"13px",lineHeight:"1.7",padding:"10px 14px",resize:"vertical",fontFamily:"inherit"}}/>
            {over&&<div style={{padding:"2px 14px 8px",fontSize:"11px",color:T.danger}}>Over {p.label} limit by {currentText.length-p.charLimit}</div>}
          </div>
        );
      })}
      {dirty&&<Btn onClick={handleSave} variant="primary" small>Save Edits</Btn>}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// EVENT CARD
// ═════════════════════════════════════════════════════════════════════════════
function EventCard({event,post,editedPost,isPast,isExpanded,isGenerating,onGenerate,onToggle,onDelete,onUpdateText,onSaveEdits,onOpenModal,activePlatforms,onAddToQueue,onIsQueued}) {
  const T=useT();
  const color=TYPE_COLOR[event.type]||TYPE_COLOR.Other;
  const hasPost=!!post;
  const d=event.date?localDate(event.date):null;
  return (
    <div className="card-enter" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:"16px",marginBottom:"10px",overflow:"hidden",boxShadow:T.shadow,opacity:isPast?.72:1}}>
      {/* Main row */}
      <div style={{padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:"12px"}}>
        {/* Date badge */}
        <div style={{flexShrink:0,background:T.bgCardAlt,borderRadius:"10px",padding:"8px 10px",textAlign:"center",minWidth:"46px",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:"10px",color,textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:"700"}}>{d?d.toLocaleDateString("en-US",{month:"short"}):"—"}</div>
          <div style={{fontSize:"20px",fontWeight:"700",color:T.text,lineHeight:1.1}}>{d?d.getDate():"—"}</div>
        </div>
        {/* Content */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"5px"}}>
            <Pill color={color}>{event.type}</Pill>
            {hasPost&&<Pill color={T.success}>Posts ready</Pill>}
            {event.registration==="Open"&&<Pill color={T.success}>Reg. open</Pill>}
            {event.registration==="Closed"&&<Pill color={T.danger}>Reg. closed</Pill>}
          </div>
          <div style={{fontSize:"16px",fontWeight:"600",color:T.text,lineHeight:"1.3",marginBottom:"3px"}}>{event.title}</div>
          <div style={{fontSize:"12px",color:T.textMuted,lineHeight:"1.5"}}>
            {event.starts&&<span>{event.starts.replace(/^\w+\s/,"")}</span>}
            {event.venue&&<span>{event.starts?" · ":""}{event.venue}</span>}
          </div>
          {event.url&&<a href={event.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"12px",color:T.accent,textDecoration:"none",display:"inline-block",marginTop:"3px"}}>View event →</a>}
        </div>
        {/* Thumbnail */}
        {event.imageUrl&&(
          <div style={{flexShrink:0,width:"68px",height:"52px",borderRadius:"10px",overflow:"hidden",border:`1px solid ${T.border}`}}>
            <img src={event.imageUrl} alt={event.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
        )}
      </div>
      {/* Action bar */}
      <div style={{borderTop:`1px solid ${T.border}`,padding:"10px 16px",display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
        {!isPast&&(
          <Btn onClick={onGenerate} disabled={isGenerating} variant={hasPost?"secondary":"primary"} small>
            {isGenerating?<span style={{animation:"pulse 1s infinite"}}>Generating…</span>:hasPost?"Regenerate":"Generate Posts"}
          </Btn>
        )}
        {hasPost&&<Btn onClick={onToggle} variant="ghost" small>{isExpanded?"Hide Posts":"Edit & Post"}</Btn>}
        {event.imageUrl&&<a href={event.imageUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:"13px",color:T.accent,textDecoration:"none",fontWeight:"600",padding:"6px 0"}}>⬇ Image</a>}
        <div style={{flex:1}}/>

        <div style={{borderTop:`1px solid ${T.border}`,padding:"14px 16px"}}>
          <PostEditor post={post} editedPost={editedPost} event={event} onUpdateText={onUpdateText} onSaveEdits={onSaveEdits} onOpenModal={onOpenModal} onAddToQueue={onAddToQueue} onIsQueued={onIsQueued} activePlatforms={activePlatforms}/>
        </div>
      )}
    </div>
  );
}

// PREVIEW / POST MODAL
// ═════════════════════════════════════════════════════════════════════════════
function PreviewModal({modal,settings,onClose,onUpdateText}) {
  const T=useT();
  const {event,platformKey}=modal;
  const [text,setText]=useState(modal.text);

  const pCfg=ALL_PLATFORMS.find(p=>p.key===platformKey);
  if(!pCfg) return null;
  const over=pCfg.charLimit&&text.length>pCfg.charLimit;
  const handlePost=()=>{
    if(over&&pCfg.key==="twitter") return;
    const result=pCfg.postAction(text,settings,event);
    if(onUpdateText) onUpdateText(platformKey,text);
    setPostNote(result.note||"");
    setPosted(true);
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 0 0",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="modal-enter" style={{background:T.bgCard,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:"640px",maxHeight:"90vh",overflow:"auto",boxShadow:T.shadowLg,paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
        {/* Handle */}
        <div style={{padding:"12px 0 4px",display:"flex",justifyContent:"center"}}><div style={{width:"36px",height:"4px",borderRadius:"2px",background:T.border}}/></div>
        {/* Header */}
        <div style={{padding:"10px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${T.border}`}}>
          <div>
            <div style={{fontWeight:"700",fontSize:"17px",color:T.text}}>Post to {pCfg.label}</div>
            <div style={{fontSize:"12px",color:T.textMuted,marginTop:"2px"}}>{event.title}</div>
          </div>
          <button onClick={onClose} style={{background:T.bgCardAlt,border:"none",borderRadius:"50%",width:"30px",height:"30px",cursor:"pointer",color:T.textSub,fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px"}}>
          {/* Event image */}
          {event.imageUrl&&(
            <div style={{display:"flex",gap:"10px",marginBottom:"14px",alignItems:"center",padding:"10px 12px",background:T.bgCardAlt,borderRadius:"12px"}}>
              <img src={event.imageUrl} alt="" style={{width:"56px",height:"42px",objectFit:"cover",borderRadius:"8px",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:"13px",color:T.textSub}}>Save the event image, then upload it when you post.</div>
                <a href={event.imageUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:"13px",color:T.accent,fontWeight:"600",textDecoration:"none"}}>⬇ Save Image</a>
              </div>
            </div>

          {/* Editable text */}
          <div style={{fontSize:"12px",fontWeight:"600",color:T.textMuted,textTransform:"uppercase",letterSpacing:"0.7px",marginBottom:"6px"}}>Post Text</div>
          {!posted?(
            <>
              <textarea value={text} onChange={e=>setText(e.target.value)} rows={7}
                style={{width:"100%",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:"12px",color:T.text,fontSize:"14px",lineHeight:"1.7",padding:"12px 14px",resize:"vertical",fontFamily:"inherit"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"6px",marginBottom:"16px"}}>
                <span style={{fontSize:"12px",color:over?T.danger:T.textMuted}}>{text.length}{pCfg.charLimit<999999?` / ${pCfg.charLimit}`:""}{over&&" — over limit"}</span>
                {pCfg.key==="twitter"&&text.length>240&&!over&&<span style={{fontSize:"12px",color:T.gold}}>Getting close to limit</span>}
              </div>
              <button onClick={handlePost} disabled={pCfg.key==="twitter"&&over}
                style={{width:"100%",padding:"15px",borderRadius:"14px",border:"none",cursor:pCfg.key==="twitter"&&over?"not-allowed":"pointer",fontSize:"16px",fontWeight:"700",background:pCfg.key==="twitter"&&over?T.border:pCfg.color,color:pCfg.key==="twitter"&&over?T.textMuted:"#fff",transition:"all .2s"}}>
                Post to {pCfg.label}
              </button>
            </>
          ):(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:"40px",marginBottom:"12px"}}>✅</div>
              <div style={{fontSize:"17px",fontWeight:"600",color:T.text,marginBottom:"8px"}}>Done!</div>
              <div style={{fontSize:"14px",color:T.textSub,lineHeight:"1.6"}}>{postNote}</div>
              <Btn onClick={onClose} variant="secondary" style={{marginTop:"20px"}}>Close</Btn>

          )}

      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// BATCH QUEUE MODAL
// ═════════════════════════════════════════════════════════════════════════════
function BatchModal({queue,settings,onUpdateText,onRemove,onClose,onPosted,toast}) {
  const T=useT();
  const [posting,setPosting]=useState(false);
  const [results,setResults]=useState({});
  const postAll=async()=>{
    setPosting(true);
    for(const q of queue){
      const pCfg=ALL_PLATFORMS.find(p=>p.key===q.platformKey);
      if(!pCfg) continue;
      try{ pCfg.postAction(q.text,settings,{title:q.eventTitle,url:""}); setResults(r=>({...r,[q.eventId+q.platformKey]:"ok"})); }
      catch{ setResults(r=>({...r,[q.eventId+q.platformKey]:"err"})); }
      await new Promise(r=>setTimeout(r,500));
    }
    setPosting(false); onPosted?.(); toast("All queued posts sent!");
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="modal-enter" style={{background:T.bgCard,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:"640px",maxHeight:"85vh",overflow:"auto",boxShadow:T.shadowLg,paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
        <div style={{padding:"12px 0 4px",display:"flex",justifyContent:"center"}}><div style={{width:"36px",height:"4px",borderRadius:"2px",background:T.border}}/></div>
        <div style={{padding:"10px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontWeight:"700",fontSize:"17px",color:T.text}}>Post Queue ({queue.length})</div>
          <button onClick={onClose} style={{background:T.bgCardAlt,border:"none",borderRadius:"50%",width:"30px",height:"30px",cursor:"pointer",color:T.textSub,fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {queue.length===0?(
          <div style={{padding:"40px",textAlign:"center",color:T.textMuted}}>
            <div style={{fontSize:"36px",marginBottom:"12px",opacity:.4}}>📋</div>
            <div style={{fontSize:"15px"}}>Queue is empty</div>
            <div style={{fontSize:"13px",marginTop:"6px"}}>Add posts using the "+ Queue" buttons</div>
          </div>
        ):(
          <>
            <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:"8px"}}>
              {queue.map(q=>{
                const pCfg=ALL_PLATFORMS.find(p=>p.key===q.platformKey);
                const res=results[q.eventId+q.platformKey];
                return (
                  <div key={q.eventId+q.platformKey} style={{background:T.bgCardAlt,borderRadius:"12px",overflow:"hidden",border:`1px solid ${T.border}`}}>
                    <div style={{padding:"8px 12px",background:T.bgCard,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><span style={{fontWeight:"600",fontSize:"13px",color:pCfg?.color}}>{pCfg?.label}</span><span style={{fontSize:"12px",color:T.textMuted,marginLeft:"8px"}}>{q.eventTitle}</span></div>
                      <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                        {res==="ok"&&<span style={{fontSize:"16px"}}>✅</span>}
                        {res==="err"&&<span style={{fontSize:"16px"}}>❌</span>}
                        {!res&&<button onClick={()=>onRemove(q.eventId,q.platformKey)} style={{background:"none",border:"none",cursor:"pointer",color:T.textMuted,fontSize:"16px",padding:"2px 6px"}}>✕</button>}
                      </div>
                    </div>
                    <textarea value={q.text} onChange={e=>onUpdateText(q.eventId,q.platformKey,e.target.value)} rows={3}
                      style={{width:"100%",background:"transparent",border:"none",color:T.text,fontSize:"13px",lineHeight:"1.6",padding:"10px 14px",resize:"vertical",fontFamily:"inherit"}}/>
                  </div>
                );
              })}
            </div>
            <div style={{padding:"12px 16px 4px"}}>
              <Btn onClick={postAll} disabled={posting} style={{width:"100%",justifyContent:"center",fontSize:"15px",padding:"14px"}}>
                {posting?<span style={{animation:"pulse 1s infinite"}}>Posting…</span>:`🚀 Post All (${queue.length})`}
              </Btn>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// APP
// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const [events,     setEvents]     = useState([]);
  const [posts,      setPosts]      = useState({});
  const [editedPosts,setEditedPosts]= useState({});
  const [lastScan,   setLastScan]   = useState(null);
  const [scanning,   setScanning]   = useState(false);
  const [scanStep,   setScanStep]   = useState("");
  const [genId,      setGenId]      = useState(null);
  const [activeTab,  setActiveTab]  = useState("upcoming");
  const [expandedId, setExpandedId] = useState(null);
  const [notif,      setNotif]      = useState(null);
  const [modal,      setModal]      = useState(null);
  const [showScript, setShowScript] = useState(false);
  const [scriptCopied,setScriptCopied]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [settings,   setSettings]   = useState(DEFAULT_SETTINGS);
  const [isDark,     setIsDark]     = useState(true);
  const [queue,      setQueue]      = useState([]);
  const [showBatch,  setShowBatch]  = useState(false);
  const [pastUrl,    setPastUrl]    = useState("");
  const [pastComment,setPastComment]= useState("");
  const [pastFetching,setPastFetching]=useState(false);
  const [pastEvent,  setPastEvent]  = useState(null);
  const [pastPosts,  setPastPosts]  = useState(null);
  const T = isDark ? DARK : LIGHT;

  // Theme
  useEffect(()=>{
    const s=localStorage.getItem(SK_THEME);
    if(s!==null) setIsDark(s==="dark");
    else setIsDark(window.matchMedia?.("(prefers-color-scheme:dark)").matches!==false);
  },[]);
  const toggleTheme=()=>{ const n=!isDark; setIsDark(n); localStorage.setItem(SK_THEME,n?"dark":"light"); };

  // Load data
  useEffect(()=>{
    (async()=>{
      try {
        const rs=await window.storage.get(SK_SETTINGS).catch(()=>null);
        if(rs){ const s=JSON.parse(rs.value); const m={...DEFAULT_SETTINGS,...s,platforms:{...DEFAULT_SETTINGS.platforms,...(s.platforms||{})}}; setSettings(m); if(!m.setupComplete) setShowSettings(true); }
        else setShowSettings(true);
      } catch { setShowSettings(true); }
      try {
        let evs=KNOWN_EVENTS.map(e=>({...e}));
        const r=await window.storage.get(SK_EVENTS).catch(()=>null);
        if(r){ const stored=JSON.parse(r.value); evs=evs.map(e=>{const s=stored.find(x=>x.id===e.id);return s?{...e,...s,imageUrl:e.imageUrl}:e;}); const ids=new Set(evs.map(e=>e.id)); const extras=stored.filter(e=>!ids.has(e.id)); if(extras.length) evs=[...evs,...extras].sort((a,b)=>a.date>b.date?1:-1); }
        await window.storage.set(SK_EVENTS,JSON.stringify(evs)); setEvents(evs);
      } catch {}
      try {
        let rp=await window.storage.get(SK_POSTS).catch(()=>null);
        if(rp){ const p=JSON.parse(rp.value); setPosts(p); const ep={}; Object.keys(p).forEach(id=>{ep[id]={linkedin:p[id].linkedin||"",twitter:p[id].twitter||"",facebook:p[id].facebook||"",instagram:p[id].instagram||"",email:p[id].email||"",file:p[id].file||""};}); setEditedPosts(ep); }
      } catch {}
      try { const r=await window.storage.get(SK_SCAN).catch(()=>null); if(r) setLastScan(r.value); } catch {}
    })();
  },[]);

  const toast=(msg,type="ok")=>{ setNotif({msg,type}); setTimeout(()=>setNotif(null),3500); };
  const saveEvents=async(ev)=>{ setEvents(ev); await window.storage.set(SK_EVENTS,JSON.stringify(ev)); };
  const savePosts=async(p)=>{ setPosts(p); await window.storage.set(SK_POSTS,JSON.stringify(p)); };
  const saveSettings=async(s)=>{ setSettings(s); await window.storage.set(SK_SETTINGS,JSON.stringify(s)); toast("Settings saved"); };
  const activePlatforms=ALL_PLATFORMS.filter(p=>settings.platforms[p.key]);

  // Queue
  const addToQueue=(event,pKey)=>{
    const text=(editedPosts[event.id]?.[pKey])||(posts[event.id]?.[pKey])||"";
    setQueue(prev=>[...prev.filter(q=>!(q.eventId===event.id&&q.platformKey===pKey)),{eventId:event.id,platformKey:pKey,text,eventTitle:event.title,eventDate:event.date}]);
    toast("Added to queue: "+ALL_PLATFORMS.find(p=>p.key===pKey)?.label);
  };
  const removeFromQueue=(eid,pKey)=>setQueue(prev=>prev.filter(q=>!(q.eventId===eid&&q.platformKey===pKey)));
  const updateQueueText=(eid,pKey,text)=>setQueue(prev=>prev.map(q=>q.eventId===eid&&q.platformKey===pKey?{...q,text}:q));
  const isQueued=(eid,pKey)=>queue.some(q=>q.eventId===eid&&q.platformKey===pKey);

  // Past event fetch
  const fetchPastEvent=useCallback(async()=>{
    if(!pastUrl.trim()){toast("Enter a URL first","err");return;}
    if(!settings.setupComplete){setShowSettings(true);return;}
    setPastFetching(true); setPastEvent(null); setPastPosts(null);
    try {
      const plats=activePlatforms.length>0?activePlatforms:ALL_PLATFORMS;
      const specs={linkedin:"Max 100 words. Professional retrospective. Include URL.",twitter:"Max 240 chars. Punchy past tense. Include URL.",facebook:"Max 60 words. Warm retrospective. Include URL.",instagram:"Max 60 words. Engaging past tense. Include URL. Only hashtags from source.",email:"Max 150 words. Professional retrospective. Include URL.",file:"Max 150 words. Neutral summary. Include URL."};
      const pList=plats.map(p=>`"${p.key}": "${specs[p.key]||'Max 80 words. Include URL.'}"`).join(",\n  ");
      const uc=pastComment.trim();
      const data=await callClaude([{role:"user",content:`Fetch and read this event page: ${pastUrl}\n\nCreate retrospective social media posts.\n\n${uc?`USER CONTEXT:\n${uc}\n\n`:""}RULES: past tense; match source style/tone; only hashtags from source${uc?" or user comments":""};  always include URL: ${pastUrl}; brief per specs.\n\nFirst extract: TITLE: ... DATE: ... VENUE: ... IMAGE_URL: ...\nThen: POSTS:\n{\n  ${pList}\n}`}],
        "Fetch the URL, extract event info and image, generate retrospective posts. Return TITLE/DATE/VENUE/IMAGE_URL lines then POSTS: JSON exactly.",settings);
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const jm=txt.replace(/```json|```/g,"").match(/POSTS:\s*\n?\s*(\{[\s\S]*\})/);
      if(!jm){toast("Couldn't parse event page","err");setPastFetching(false);return;}
      const parsed=JSON.parse(jm[1]);
      setPastEvent({id:"past-"+Date.now(),title:(txt.match(/TITLE:\s*(.+)/)?.[1]||"Past Event").trim(),date:(txt.match(/DATE:\s*(.+)/)?.[1]||"").trim(),venue:(txt.match(/VENUE:\s*(.+)/)?.[1]||"").trim(),url:pastUrl,imageUrl:(txt.match(/IMAGE_URL:\s*(.+)/)?.[1]||"").trim()||null,type:"Past"});
      setPastPosts(parsed);
      setPastFetching(false); toast("Posts generated!");
    } catch(e){ if(e.message==="NO_API_KEY") setShowSettings(true); else toast(e.message,"err"); setPastFetching(false); }
  },[pastUrl,pastComment,settings,activePlatforms]);

  // Process scraped events
  const processScrapedEvents=useCallback((raw)=>{
    if(!Array.isArray(raw)){toast("Invalid format","err");return;}
    const incoming=raw.map(e=>({...e,date:e.date||parseDate(e.starts),type:e.type||parseType(e.title)})).filter(e=>e.date&&localDate(e.date)>=ONE_MONTH_AGO);
    setEvents(prev=>{
      const im=Object.fromEntries(incoming.map(e=>[e.id,e]));
      const eu=prev.filter(e=>localDate(e.date)>=ONE_MONTH_AGO).map(e=>im[e.id]?{...e,...im[e.id]}:e);
      const ids=new Set(eu.map(e=>e.id));
      const merged=[...eu,...incoming.filter(e=>!ids.has(e.id))].sort((a,b)=>localDate(a.date)-localDate(b.date));
      window.storage.set(SK_EVENTS,JSON.stringify(merged)); return merged;
    });
    const now=new Date().toLocaleString(); setLastScan(now); window.storage.set(SK_SCAN,now);
    setScanStep(`✅ Loaded ${incoming.length} event(s)`); toast(`${incoming.length} event(s) loaded`); setScanning(false);
  },[]);

  // Auto scan
  const autoScan=useCallback(async()=>{
    if(!settings.setupComplete){setShowSettings(true);return;}
    setScanning(true); setScanStep("Searching for events…");
    try {
      const data=await callClaude([{role:"user",content:`Search for events from ${settings.eventSourceUrl}. Today: ${TODAY.toISOString().split("T")[0]}. From ${ONE_MONTH_AGO.toISOString().split("T")[0]} onwards. Return ONLY JSON array: [{"id":"slug-YYYY-MM-DD","title":"","date":"YYYY-MM-DD","starts":"","ends":"","venue":"","address":"","description":"","registration":"Open|Closed|Unknown","url":"","type":"Sundowner|Gala|Conference|Networking|Cultural|Other","imageUrl":null}]`}],
        "Return ONLY a raw JSON array. No markdown.",settings);
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=txt.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);
      if(!m){setScanStep("⚠️ Using known events"); processScrapedEvents(KNOWN_EVENTS); return;}
      try{processScrapedEvents(JSON.parse(m[0]));}catch{processScrapedEvents(KNOWN_EVENTS);}
    }catch(e){
      if(e.message==="NO_API_KEY"){setShowSettings(true);setScanning(false);setScanStep("");return;}
      setScanStep("⚠️ Using known events"); processScrapedEvents(KNOWN_EVENTS);
    }
  },[settings,processScrapedEvents]);

  // Generate posts
  const generatePost=useCallback(async(event)=>{
    if(!settings.setupComplete){setShowSettings(true);return;}
    setGenId(event.id);
    const plats=activePlatforms.length>0?activePlatforms:ALL_PLATFORMS;
    const specs={linkedin:"Max 100 words. Professional. Include event URL. Mention registration.",twitter:"Max 240 chars. Punchy. Include event URL.",facebook:"Max 60 words. Warm. Include event URL. Mention registration.",instagram:"Max 60 words. Engaging. Include event URL. Only hashtags from source.",email:"Max 150 words. Professional. All event details, URL, registration.",file:"Max 150 words. Neutral summary. All details and URL."};
    const pList=plats.map(p=>`"${p.key}": "${specs[p.key]||'Max 80 words. Include URL.'}"`).join(",\n  ");
    const regNote=event.registration==="Open"?"Registration is open.":event.registration==="Closed"?"Registration is closed.":"";
    try {
      const data=await callClaude([{role:"user",content:`Create social media posts for this event.\n\nMatch the style and tone of the description exactly. No invented hashtags, slogans, or extra personality.\n\nEVENT:\nTitle: ${event.title}\nDate: ${fmtDate(event.date)}${event.starts?" ("+event.starts+")":""}\nVenue: ${event.venue||""}${event.address?" — "+event.address:""}\nDescription: ${event.description||""}\n${regNote}\nURL: ${event.url}\n\nRULES: Always include URL. ${regNote?"Always mention registration.":""} Only hashtags from description. No invented details.\n\nReturn ONLY JSON:\n{\n  ${pList}\n}`}],
        "Return ONLY valid JSON. No markdown.",settings);
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=txt.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
      if(!m){toast("Parse error — try again","err");setGenId(null);return;}
      const parsed=JSON.parse(m[0]);
      const np={...posts,[event.id]:{...parsed,generatedAt:new Date().toISOString()}};
      await savePosts(np);
      setEditedPosts(prev=>({...prev,[event.id]:Object.fromEntries(plats.map(p=>[p.key,parsed[p.key]||""]))}));
      setExpandedId(event.id); toast("Posts generated!");
    }catch(e){ if(e.message==="NO_API_KEY") setShowSettings(true); else toast(e.message,"err"); }
    setGenId(null);
  },[posts,settings,activePlatforms]);

  const updateEditedPost=(eid,pKey,val)=>setEditedPosts(prev=>({...prev,[eid]:{...prev[eid],[pKey]:val}}));
  const saveEditedPost=async(eid)=>{ const ep=editedPosts[eid]; if(!ep) return; await savePosts({...posts,[eid]:{...posts[eid],...ep,lastEdited:new Date().toISOString()}}); toast("Edits saved"); };
  const openModal=(event,pKey)=>{ const text=(editedPosts[event.id]?.[pKey])||(posts[event.id]?.[pKey])||""; if(!text){toast("Generate posts first","err");return;} setModal({event,platformKey:pKey,text}); };
  const deleteEvent=async(id)=>{ const ev=events.find(e=>e.id===id); if(!window.confirm(`Delete "${ev?.title}"?${posts[id]?"\n\nThis will also remove generated posts.":""}`)) return; await saveEvents(events.filter(e=>e.id!==id)); const np={...posts}; delete np[id]; await savePosts(np); const ne={...editedPosts}; delete ne[id]; setEditedPosts(ne); toast("Deleted"); };
  const copyScript=()=>navigator.clipboard.writeText(CONSOLE_SCRIPT).then(()=>{setScriptCopied(true);setTimeout(()=>setScriptCopied(false),2500);});

  const upcoming=events.filter(e=>isFuture(e.date));
  const past=events.filter(e=>isPastDate(e.date));
  const withPosts=events.filter(e=>posts[e.id]);

  // Settings view
  if(showSettings) return (
    <ThemeCtx.Provider value={T}>
      <GS T={T}/>
      <SettingsPage settings={settings} isDark={isDark} onToggleTheme={toggleTheme}
        onSave={async s=>{await saveSettings(s);if(s.setupComplete) setShowSettings(false);}}
        onClose={settings.setupComplete?()=>setShowSettings(false):null}
        isFirstRun={!settings.setupComplete}/>
    </ThemeCtx.Provider>
  );

  return (
    <ThemeCtx.Provider value={T}>
      <GS T={T}/>
      <div style={{minHeight:"100vh",background:T.bg,fontFamily:"-apple-system,'SF Pro Text','Helvetica Neue',sans-serif",color:T.text,transition:"background .3s,color .3s"}}>

        {/* ── Nav bar ── */}
        <div style={{position:"sticky",top:0,zIndex:100,backdropFilter:T.blur,WebkitBackdropFilter:T.blur,background:T.bgHeader,borderBottom:`1px solid ${T.border}`,height:"52px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",gap:"8px"}}>
          <div style={{fontWeight:"700",fontSize:"17px",color:T.text,letterSpacing:"-0.3px"}}>Social Media</div>
          <div style={{display:"flex",alignItems:"center",gap:"2px"}}>
            {lastScan&&<span style={{fontSize:"11px",color:T.textMuted,marginRight:"6px",display:"none"}}>Synced</span>}
            <IconBtn onClick={()=>setShowBatch(true)} badge={queue.length} title="Queue"><ListIcon/></IconBtn>
            <IconBtn onClick={toggleTheme} title={isDark?"Light mode":"Dark mode"}>{isDark?<SunIcon/>:<MoonIcon/>}</IconBtn>
            <IconBtn onClick={()=>setShowSettings(true)} title="Settings"><GearIcon/></IconBtn>
          </div>
        </div>

        {/* ── Setup warning ── */}
        {!settings.setupComplete&&(
          <div style={{background:T.danger+"18",borderBottom:`1px solid ${T.danger}33`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
            <span style={{fontSize:"13px",color:T.danger}}>⚠️ Setup required to generate posts</span>
            <Btn onClick={()=>setShowSettings(true)} variant="danger" small>Open Settings</Btn>
          </div>
        )}

        {/* ── Stats ── */}
        <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,background:T.bgCard}}>
          {[{val:events.length,label:"Total"},{val:upcoming.length,label:"Upcoming"},{val:past.length,label:"Past"},{val:withPosts.length,label:"Posts"}].map((s,i)=>(
            <div key={s.label} style={{flex:1,padding:"10px 4px",textAlign:"center",borderRight:i<3?`1px solid ${T.border}`:"none"}}>
              <div style={{fontSize:"20px",fontWeight:"700",color:T.accent,letterSpacing:"-0.5px"}}>{s.val}</div>
              <div style={{fontSize:"10px",color:T.textMuted,letterSpacing:"0.5px",textTransform:"uppercase",marginTop:"1px"}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* ── Content ── */}
        <div style={{maxWidth:"680px",margin:"0 auto",padding:"14px 14px 60px"}}>

          {/* Past event generator */}
          <PastEventPanel
            pastUrl={pastUrl} setPastUrl={setPastUrl}
            pastComment={pastComment} setPastComment={setPastComment}
            pastFetching={pastFetching} pastEvent={pastEvent} pastPosts={pastPosts}
            activePlatforms={activePlatforms.length>0?activePlatforms:ALL_PLATFORMS}
            onGenerate={fetchPastEvent}
            onOpenModal={(ev,pKey)=>{ const text=pastPosts?.[pKey]||""; if(!text){toast("Generate first","err");return;} setModal({event:ev,platformKey:pKey,text}); }}
            onAddToQueue={(ev,pKey)=>{ const text=pastPosts?.[pKey]||""; if(!text) return; setQueue(prev=>[...prev.filter(q=>!(q.eventId===ev.id&&q.platformKey===pKey)),{eventId:ev.id,platformKey:pKey,text,eventTitle:ev.title,eventDate:ev.date}]); toast("Added to queue"); }}
          />

          {/* Scan panel */}
          <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:"16px",padding:"14px 16px",marginBottom:"12px",boxShadow:T.shadow}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:"150px"}}>
                <div style={{fontSize:"15px",fontWeight:"600",color:T.text,marginBottom:"2px"}}>Fetch Events</div>
                <div style={{fontSize:"12px",color:T.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"260px"}}>{settings.eventSourceUrl||"Set URL in Settings"}</div>
                {scanStep&&<div style={{marginTop:"7px",fontSize:"12px",padding:"5px 10px",borderRadius:"8px",color:scanStep.startsWith("✅")?T.success:scanStep.startsWith("⚠️")?T.gold:T.textSub,background:T.bgCardAlt}}>{scanStep}</div>}
              </div>
              <div style={{display:"flex",gap:"8px",flexShrink:0}}>
                <Btn onClick={autoScan} disabled={scanning} small>{scanning?<span style={{animation:"pulse 1s infinite"}}>Scanning…</span>:"Scan Now"}</Btn>
                <Btn onClick={()=>setShowScript(s=>!s)} variant="secondary" small>{showScript?"Hide":"Console Script"}</Btn>
              </div>
            </div>
            {showScript&&(
              <div style={{marginTop:"12px",paddingTop:"12px",borderTop:`1px solid ${T.border}`}}>
                <div style={{fontSize:"12px",color:T.textSub,marginBottom:"6px"}}>Open <a href={settings.eventSourceUrl} target="_blank" rel="noopener noreferrer" style={{color:T.accent}}>{settings.eventSourceUrl}</a> → F12 → Console → paste &amp; run</div>
                <div style={{position:"relative"}}>
                  <pre style={{background:T.bgCardAlt,border:`1px solid ${T.border}`,borderRadius:"10px",padding:"10px 12px",fontSize:"10px",color:T.textSub,overflow:"auto",maxHeight:"90px",fontFamily:"monospace"}}>{CONSOLE_SCRIPT}</pre>
                  <button onClick={copyScript} style={{position:"absolute",top:"8px",right:"8px",background:T.bgCard,color:scriptCopied?T.success:T.textSub,border:`1px solid ${T.border}`,borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"11px",fontWeight:"600"}}>{scriptCopied?"✓ Copied":"Copy"}</button>
                </div>
              </div>
            )}
          </div>

          {/* Segmented tab control */}
          <div style={{display:"flex",background:T.bgCardAlt,borderRadius:"10px",padding:"3px",marginBottom:"14px",gap:"2px"}}>
            {[{id:"upcoming",label:"Upcoming",count:upcoming.length},{id:"past",label:"Past",count:past.length},{id:"posts",label:"Posts",count:withPosts.length}].map(t=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)}
                style={{flex:1,padding:"7px 4px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"13px",fontWeight:"600",transition:"all .18s",background:activeTab===t.id?T.bgCard:"transparent",color:activeTab===t.id?T.text:T.textMuted,boxShadow:activeTab===t.id?T.shadow:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>
                {t.label}
                {t.count>0&&<span style={{fontSize:"11px",background:activeTab===t.id?T.accent:T.textMuted,color:"#fff",borderRadius:"10px",padding:"1px 6px",lineHeight:"16px"}}>{t.count}</span>}
              </button>
            ))}
          </div>

          {activeTab==="upcoming"&&(upcoming.length===0
            ?<EmptyState icon="📅" msg="No upcoming events" sub='Tap "Scan Now" to load events.'/>
            :upcoming.map(ev=><EventCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]}
                isExpanded={expandedId===ev.id} isGenerating={genId===ev.id} activePlatforms={activePlatforms}
                onGenerate={()=>generatePost(ev)} onToggle={()=>setExpandedId(expandedId===ev.id?null:ev.id)}
                onDelete={()=>deleteEvent(ev.id)} onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)}
                onSaveEdits={()=>saveEditedPost(ev.id)} onOpenModal={(pKey)=>openModal(ev,pKey)}
                onAddToQueue={(pKey)=>addToQueue(ev,pKey)} onIsQueued={(pKey)=>isQueued(ev.id,pKey)}/>)
          )}
          {activeTab==="past"&&(past.length===0
            ?<EmptyState icon="🗂" msg="No past events" sub="Events before today appear here."/>
            :past.map(ev=><EventCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]} isPast
                isExpanded={expandedId===ev.id} isGenerating={false} activePlatforms={activePlatforms}
                onToggle={()=>setExpandedId(expandedId===ev.id?null:ev.id)} onDelete={()=>deleteEvent(ev.id)}
                onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)} onSaveEdits={()=>saveEditedPost(ev.id)}
                onOpenModal={(pKey)=>openModal(ev,pKey)}
                onAddToQueue={(pKey)=>addToQueue(ev,pKey)} onIsQueued={(pKey)=>isQueued(ev.id,pKey)}/>)
          )}
          {activeTab==="posts"&&(withPosts.length===0
            ?<EmptyState icon="✍️" msg="No posts yet" sub='Go to Upcoming and tap "Generate Posts"./>
            :withPosts.map(ev=><PostCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]}
                activePlatforms={activePlatforms}
                onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)}
                onSaveEdits={()=>saveEditedPost(ev.id)} onOpenModal={(pKey)=>openModal(ev,pKey)}
                onAddToQueue={(pKey)=>addToQueue(ev,pKey)} onIsQueued={(pKey)=>isQueued(ev.id,pKey)}/>)
          )}
        </div>
      </div>

      {/* Modals */}
      {modal&&<PreviewModal modal={modal} settings={settings} onClose={()=>setModal(null)} onUpdateText={(pKey,text)=>{ updateEditedPost(modal.event.id,pKey,text); saveEditedPost(modal.event.id); }}/>}
      {showBatch&&<BatchModal queue={queue} settings={settings} onUpdateText={updateQueueText} onRemove={removeFromQueue} onClose={()=>setShowBatch(false)} onPosted={()=>setQueue([])} toast={toast}/>}
      <Toast notif={notif}/>
    </ThemeCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
