    }
    #api-banner .btn-save {
      padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
      background: #FFCD00; color: #001A4D; font-weight: bold; font-size: 13px;
      white-space: nowrap;
    }
    #api-banner .btn-hide {
      padding: 4px 8px; border-radius: 4px; border: 1px solid #6B8FAD;
      background: transparent; color: #6B8FAD; font-size: 11px; cursor: pointer;
      white-space: nowrap; margin-left: auto;
    }
    #api-banner .status { font-size: 12px; white-space: nowrap; }
    #api-banner .help-link { font-size: 11px; color: #6B8FAD; white-space: nowrap; }
    #api-banner .help-link a { color: #FFCD00; }

    /* Key saved indicator in corner */
    #key-indicator {
      position: fixed; top: 6px; right: 10px; z-index: 10000;
      background: #1a3a1a; border: 1px solid #4CAF50; border-radius: 20px;
      padding: 3px 10px; font-size: 11px; color: #4CAF50;
      cursor: pointer; display: none;
    }

    #root { padding-top: 0; }
    #root.has-banner { padding-top: 56px; }

    /* Mobile tweaks */

<body>

<div id="api-banner">
  <label>🔑 Anthropic API Key</label>
  <input type="password" id="key-input" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="btn-save" onclick="saveKey()">Save</button>
  <span class="status" id="key-status"></span>
  <span class="help-link">
    <a href="https://console.anthropic.com/settings/keys" target="_blank">Get free key ↗</a>
  </span>
  <button class="btn-hide" onclick="hideBanner()">Hide ✕</button>
</div>

<div id="key-indicator" onclick="showBanner()">🔑 Key saved ✓</div>
<div id="root" class="has-banner"></div>

<script>
  // --- API Key management ---
  function loadKey() {
    const k = localStorage.getItem("aacc-api-key");
    if (k) {
      document.getElementById("key-input").value = k;
      window.ANTHROPIC_API_KEY = k;
      setStatus("✓ Key loaded", "#4CAF50");
    }
  }
  function saveKey() {
    const k = document.getElementById("key-input").value.trim();
    if (!k) { setStatus("⚠ Enter a key", "#FF6B6B"); return; }
    if (!k.startsWith("sk-ant-")) { setStatus("⚠ Should start with sk-ant-", "#FF6B6B"); return; }
    localStorage.setItem("aacc-api-key", k);
    window.ANTHROPIC_API_KEY = k;
    setStatus("✓ Saved!", "#4CAF50");
    setTimeout(hideBanner, 1200);
  }
  function setStatus(msg, color) {
    const el = document.getElementById("key-status");
    el.textContent = msg; el.style.color = color;
  }
  function hideBanner() {
    document.getElementById("api-banner").classList.add("hidden");
    document.getElementById("root").classList.remove("has-banner");
    if (window.ANTHROPIC_API_KEY) {
      document.getElementById("key-indicator").style.display = "block";
    }
  }
  function showBanner() {
    document.getElementById("api-banner").classList.remove("hidden");
    document.getElementById("root").classList.add("has-banner");
    document.getElementById("key-indicator").style.display = "none";
  }

  // Allow Enter key to save
  document.getElementById("key-input").addEventListener("keydown", e => {
    if (e.key === "Enter") saveKey();
  });

  // localStorage storage polyfill
  window.storage = {
    get: (key) => { try { const v=localStorage.getItem(key); return Promise.resolve(v ? {key,value:v} : null); } catch(e) { return Promise.resolve(null); } },
    set: (key, value) => { try { localStorage.setItem(key,String(value)); return Promise.resolve({key,value}); } catch(e) { return Promise.resolve(null); } },
    delete: (key) => { try { localStorage.removeItem(key); return Promise.resolve({key,deleted:true}); } catch(e) { return Promise.resolve(null); } },
    list: (prefix) => { try { const keys=Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix)); return Promise.resolve({keys}); } catch(e) { return Promise.resolve({keys:[]}); } }
  };

  loadKey();
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Storage keys ──────────────────────────────────────────────────────────────
const SK_EVENTS = "aacc-events-v3";

const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const ONE_MONTH_AGO = new Date(TODAY);
ONE_MONTH_AGO.setMonth(ONE_MONTH_AGO.getMonth() - 1);

// ── Helpers ───────────────────────────────────────────────────────────────────
// Parse YYYY-MM-DD as LOCAL noon to avoid UTC midnight rolling back a day in CDT/CST (UTC-5/6)
function localDate(str) {
  if (!str) return null;
  const iso = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return new Date(Number(iso[1]), Number(iso[2])-1, Number(iso[3]), 12, 0, 0);
  return new Date(str);
}
const fmtDate = d => { if(!d) return ""; const x=localDate(d); return (x&&!isNaN(x)) ? x.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"}) : ""; };
const isFuture = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c>=TODAY; };
const isPast   = d => { if(!d) return false; const x=localDate(d); if(!x||isNaN(x)) return false; const c=new Date(x); c.setHours(0,0,0,0); return c<TODAY; };

function parseDate(s) {
  if (!s) return null;
  // "Thu Mar 12 2026" style: named months parse as local time, safe
  const m = s.match(/(\w{3}\s+\w{3}\s+\d+\s+\d{4})/);
  if (m) {
    const d = new Date(m[1]);
    if (!isNaN(d)) return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  // YYYY-MM-DD passthrough (already correct format, localDate() will handle display)
  const iso = s.match(/^(\d{4}-\d{2}-\d{2})/);
  if (iso) return iso[1];
  const d2 = new Date(s);
  return isNaN(d2) ? null : d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");
}
function parseType(t) {
  if (!t) return "Other"; const s=t.toLowerCase();
  if (s.includes("sundowner")) return "Sundowner";
  if (s.includes("gala"))      return "Gala";
  if (s.includes("conference")||s.includes("ausii")) return "Conference";
  if (s.includes("coffee")||s.includes("monday")||s.includes("network")||s.includes("multinational")) return "Networking";
  if (s.includes("anzac")||s.includes("remembrance")) return "Cultural";
  return "Other";
}

async function callClaude(messages, system) {
  const apiKey = window.ANTHROPIC_API_KEY || localStorage.getItem("aacc-api-key") || "";
  if (!apiKey) throw new Error("NO_API_KEY");
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system,messages})
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e?.error?.message||"API error "+r.status); }
  return r.json();
}

// ── Console scraper script ────────────────────────────────────────────────────
const CONSOLE_SCRIPT = `(async function(){function wait(ms){return new Promise(r=>setTimeout(r,ms))}function get(raw,label){var idx=raw.indexOf(label+'\\t');if(idx===-1)return null;return raw.substring(idx+label.length+1).split('\\n')[0].trim()}function scrape(){var raw=document.body.innerText;var title=document.title.replace(' - Australian American Chamber of Commerce Texas (AACC)','').trim();var paras=Array.from(document.querySelectorAll('p')).map(p=>p.textContent.trim()).filter(s=>s.length>20).slice(0,4).join(' ');var imgEl=document.getElementById('SFevtinfimg');var imageUrl=imgEl?imgEl.src.split('?')[0]:null;return{id:window.location.href.replace(/.*#!event\\//,'').replace(/\\//g,'-'),title,url:window.location.href,venue:get(raw,'Venue'),address:get(raw,'Address'),starts:get(raw,'Starts'),ends:get(raw,'Ends'),registration:raw.includes('REGISTRATION IS CLOSED')?'Closed':raw.includes('Register')?'Open':'Unknown',description:paras.substring(0,600),imageUrl}}window.location.hash='!event-list';await wait(4000);var links=[...new Set(Array.from(document.querySelectorAll('a[href*="!event/"]')).map(a=>a.href))];var events=[];for(var i=0;i<links.length;i++){window.location.hash=links[i].split('#')[1];await wait(3000);if(window.location.hostname==='www.aacc-texas.org'){events.push(scrape())}else{var r2=document.body.innerText;events.push({id:links[i].replace(/.*#!event\\//,'').replace(/\\//g,'-'),title:document.title.split(' - ')[0].trim(),url:links[i],venue:null,address:null,starts:null,ends:null,registration:r2.includes('Register')?'Open':'Unknown',description:Array.from(document.querySelectorAll('p')).map(p=>p.textContent.trim()).filter(s=>s.length>20).slice(0,3).join(' ').substring(0,400),imageUrl:null});window.location.href=links[i];await wait(3500)}}var out=JSON.stringify(events);console.log('AACC_EVENTS_DATA:'+out);try{copy(out)}catch(e){}alert('Done! '+events.length+' events scraped with images. Paste JSON into the app.');return events})();`;

// ── Image utilities ───────────────────────────────────────────────────────────
// Claude.ai CSP blocks direct CloudFront images — proxy through images.weserv.nl
function proxyImg(url) {
  // Direct CloudFront URLs load fine from a.claude.ai — no proxy needed
  return url || null;
}

async function fetchImageAsBase64(url) {
  // CloudFront blocks CORS entirely — crossOrigin="anonymous" poisons the browser cache
  // and breaks subsequent plain <img src> loads for the same URL.
  // For exports, just embed the URL as a markdown image link instead of base64.
  return null;
}

// ── Export utilities ──────────────────────────────────────────────────────────
function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function exportMarkdown(eventsToExport, posts, editedPosts) {
  const ts = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  let md = `# AACC Texas — Social Media Posts\n_Exported ${ts}_\n\n---\n\n`;
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    md += `## ${ev.title}\n`;
    md += `**Date:** ${fmtDate(ev.date)}  \n`;
    if (ev.venue)   md += `**Venue:** ${ev.venue}  \n`;
    if (ev.address) md += `**Address:** ${ev.address}  \n`;
    md += `**Type:** ${ev.type}  \n`;
    if (ev.url) md += `**Link:** ${ev.url}  \n`;
    md += `\n`;
    // Embed image
    if (ev.imageUrl) {
      md += `![${ev.title}](${ev.imageUrl})\n\n`;
    }
    PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      md += `### ${pl.label}\n\n${text}\n\n`;
    });
    md += `---\n\n`;
  });
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.md`, md, "text/markdown");
}

function exportCSV(eventsToExport, posts, editedPosts) {
  const rows = [["Event","Date","Venue","Type","Platform","Post Text","Character Count","Generated At"]];
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      const safe = (s) => `"${String(s).replace(/"/g,'""')}"`;
      rows.push([safe(ev.title), safe(fmtDate(ev.date)), safe(ev.venue||""), safe(ev.type), safe(pl.label), safe(text), text.length, safe(p.generatedAt ? new Date(p.generatedAt).toLocaleDateString() : "")]);
    });
  });
  const csv = rows.map(r => r.join(",")).join("\n");
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.csv`, csv, "text/csv");
}

function exportTxt(eventsToExport, posts, editedPosts) {
  const ts = new Date().toLocaleString();
  let txt = `AACC TEXAS — SOCIAL MEDIA POSTS\nExported: ${ts}\n${"=".repeat(60)}\n\n`;
  eventsToExport.forEach(ev => {
    const p = posts[ev.id]; if (!p) return;
    const ep = editedPosts[ev.id] || {};
    txt += `EVENT: ${ev.title}\n`;
    txt += `Date:  ${fmtDate(ev.date)}\n`;
    if (ev.venue)   txt += `Venue: ${ev.venue}\n`;
    if (ev.address) txt += `Addr:  ${ev.address}\n`;
    txt += `\n`;
    PLATFORMS.forEach(pl => {
      const text = ep[pl.key] || p[pl.key] || "";
      if (!text) return;
      txt += `[ ${pl.label.toUpperCase()} — ${text.length} chars ]\n`;
      txt += `${"-".repeat(40)}\n${text}\n\n`;
    });
    txt += `${"=".repeat(60)}\n\n`;
  });
  downloadFile(`AACC-Texas-Posts-${new Date().toISOString().split("T")[0]}.txt`, txt, "text/plain");
}

// ═════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════════════════════════
// ── Event image placeholder (no external URLs needed) ─────────────────────────
const TYPE_ICONS = { Sundowner:"🍺", Gala:"🎩", Conference:"💼", Networking:"🤝", Cultural:"🏛️", Other:"📅" };
const TYPE_GRADIENTS = {
  Sundowner:  "linear-gradient(135deg,#1a3a6b,#c47c00)",
  Gala:       "linear-gradient(135deg,#1a1a4e,#8b0000)",
  Conference: "linear-gradient(135deg,#0d2b4e,#0d4e3a)",
  Networking: "linear-gradient(135deg,#1a3a1a,#3a5f0b)",
  Cultural:   "linear-gradient(135deg,#3a1a00,#6b3a00)",
  Other:      "linear-gradient(135deg,#1a2a3a,#2a3a4a)",
};
function EventImage({ event, style={} }) {
  const icon = TYPE_ICONS[event.type] || "📅";
  const bg   = TYPE_GRADIENTS[event.type] || TYPE_GRADIENTS.Other;
  const defaultStyle = { display:"flex", alignItems:"center", justifyContent:"center",
    background: bg, width:"100%", height:"100%", flexDirection:"column", gap:"4px" };
  return (
    <div style={{...defaultStyle, ...style}}>
      <span style={{fontSize: style.fontSize || "28px", lineHeight:1}}>{icon}</span>
      <span style={{fontSize:"9px", color:"rgba(255,255,255,0.6)", textTransform:"uppercase",
        letterSpacing:"1px", textAlign:"center", padding:"0 4px"}}>{event.type}</span>
    </div>
  );
}

function App() {
  const [events,     setEvents]     = useState([]);
  const [posts,      setPosts]      = useState({});   // { [eventId]: { linkedin, twitter, facebook, instagram, generatedAt } }
  const [editedPosts,setEditedPosts]= useState({});   // { [eventId]: { linkedin, twitter, facebook, instagram } } — live edits
  const [lastScan,   setLastScan]   = useState(null);
  const [scanning,   setScanning]   = useState(false);
  const [scanStep,   setScanStep]   = useState("");
  const [genId,      setGenId]      = useState(null);
  const [activeTab,  setActiveTab]  = useState("upcoming");
  const [expandedId, setExpandedId] = useState(null);
  const [notif,      setNotif]      = useState(null);
  // Modal state
  const [modal,      setModal]      = useState(null); // { event, platformKey, text }
  const [postResult, setPostResult] = useState(null); // { status, note }
  // Export modal state
  const [showExport,    setShowExport]    = useState(false);
  // Script helpers
  const [showScript,    setShowScript]    = useState(false);
  const [showPaste,     setShowPaste]     = useState(false);
  const [pasteText,     setPasteText]     = useState("");
  const [scriptCopied,  setScriptCopied]  = useState(false);

  // ── Load persisted data ─────────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        // Start from KNOWN_EVENTS (guaranteed to have imageUrl), then overlay stored data on top
        const knownMap = Object.fromEntries(KNOWN_EVENTS.map(e=>[e.id,e]));
        let evs = KNOWN_EVENTS.map(e=>({...e})); // fresh copy with all imageUrls intact

        const r = await window.storage.get(SK_EVENTS);
        if (r) {
          const stored = JSON.parse(r.value);
          // Overlay stored fields (posts-related edits, user data) but KEEP imageUrl from KNOWN_EVENTS
          evs = evs.map(e => {
            const s = stored.find(x=>x.id===e.id);
            return s ? {...e, ...s, imageUrl: e.imageUrl} : e; // imageUrl always from KNOWN_EVENTS
          });
          // Add stored events that aren't in KNOWN_EVENTS (future scraped events)
          const knownIds = new Set(evs.map(e=>e.id));
          const extras = stored.filter(e=>!knownIds.has(e.id));
          if (extras.length) evs = [...evs, ...extras].sort((a,b)=>a.date>b.date?1:-1);
        }
        await window.storage.set(SK_EVENTS, JSON.stringify(evs));
        setEvents(evs);
      }catch{}
      try{
        // Try v3 posts first, then fall back to migrating from v2
        let rp = await window.storage.get(SK_POSTS).catch(()=>null);
        if (!rp) rp = await window.storage.get("aacc-posts-v2").catch(()=>null);
        if (rp) {
          const p=JSON.parse(rp.value);
          setPosts(p);
          await window.storage.set(SK_POSTS, JSON.stringify(p));
          const ep={};
          Object.keys(p).forEach(id=>{
            ep[id]={ linkedin:p[id].linkedin||"", twitter:p[id].twitter||"", facebook:p[id].facebook||"", instagram:p[id].instagram||"" };
          });
          setEditedPosts(ep);
        }
      }catch{}
      try{ const r=await window.storage.get(SK_SCAN);   if(r) setLastScan(r.value); }catch{}
    })();
  },[]);

  const toast = (msg,type="ok") => { setNotif({msg,type}); setTimeout(()=>setNotif(null),4000); };
  const saveEvents = async (ev) => { setEvents(ev); await window.storage.set(SK_EVENTS,JSON.stringify(ev)); };
  const savePosts  = async (p)  => { setPosts(p);  await window.storage.set(SK_POSTS, JSON.stringify(p));  };

  // ── Process scraped events ──────────────────────────────────────────────────
  const processScrapedEvents = useCallback((raw)=>{
    if(!Array.isArray(raw)){toast("Invalid data format","err");return;}
    const incoming=raw.map(e=>({...e,date:e.date||parseDate(e.starts),type:e.type||parseType(e.title)}))
      .filter(e=>e.date&&localDate(e.date)>=ONE_MONTH_AGO);
    setEvents(prev=>{
      // Build a map of incoming events by id for easy lookup
      const incomingMap = Object.fromEntries(incoming.map(e=>[e.id,e]));
      // Merge: update existing events with new data (especially imageUrl), add genuinely new ones
      const existingUpdated = prev
        .filter(e=>localDate(e.date)>=ONE_MONTH_AGO)
        .map(e => incomingMap[e.id] ? {...e,...incomingMap[e.id]} : e);
      const existingIds = new Set(existingUpdated.map(e=>e.id));
      const brandNew = incoming.filter(e=>!existingIds.has(e.id));
      const merged = [...existingUpdated, ...brandNew].sort((a,b)=>localDate(a.date)-localDate(b.date));
      window.storage.set(SK_EVENTS,JSON.stringify(merged));
      return merged;
    });
    const now=new Date().toLocaleString();
    setLastScan(now); window.storage.set(SK_SCAN,now);
    setScanStep(`✅ Done! Loaded ${incoming.length} event(s).`);
    toast(`${incoming.length} event(s) loaded from AACC Texas.`);
    setScanning(false); setShowPaste(false); setPasteText("");
  },[]);

  // ── Auto scan ───────────────────────────────────────────────────────────────
  const autoScan = useCallback(async()=>{
    setScanning(true); setScanStep("🤖 Searching for AACC Texas events...");
    try{
      const data=await callClaude([{role:"user",content:`Search for AACC Texas upcoming events. Today is ${TODAY.toISOString().split("T")[0]}. I need events from ${ONE_MONTH_AGO.toISOString().split("T")[0]} onwards from aacc-texas.org/events.html. Return ONLY a JSON array (no markdown). Each object: {"id":"slug-YYYY-MM-DD","title":"","date":"YYYY-MM-DD","starts":"","ends":"","venue":"","address":"","description":"","registration":"Open|Closed|Unknown","url":"https://www.aacc-texas.org/events.html#!event/...","type":"Sundowner|Gala|Conference|Networking|Cultural|Other","imageUrl":null}`}],
        "Return ONLY a raw JSON array. No markdown. No explanation.");
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);
      if(!match){setScanStep("⚠️ Web search failed — loading last known events."); processScrapedEvents(KNOWN_EVENTS); return;}
      try{processScrapedEvents(JSON.parse(match[0]));}catch{processScrapedEvents(KNOWN_EVENTS);}
    }catch{setScanStep("⚠️ Error — loading last known events."); processScrapedEvents(KNOWN_EVENTS);}
  },[processScrapedEvents]);

  const processPaste=useCallback(()=>{
    if(!pasteText.trim())return;
    setScanning(true); setScanStep("🔍 Parsing...");
    try{
      const match=pasteText.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);
      if(match){processScrapedEvents(JSON.parse(match[0]));}
      else{toast("No JSON array found in pasted text","err"); setScanning(false);}
    }catch(e){toast("Parse error: "+e.message,"err"); setScanning(false);}
  },[pasteText,processScrapedEvents]);

  // ── Generate posts ──────────────────────────────────────────────────────────
  const generatePost = useCallback(async(event)=>{
    setGenId(event.id);
    try{
      const data=await callClaude([{role:"user",content:`Create social media posts for this AACC Texas event:

Title: ${event.title}
Date: ${fmtDate(event.date)}${event.starts?" ("+event.starts+")":""}
Venue: ${event.venue||"Texas"}${event.address?" — "+event.address:""}
Description: ${event.description||"AACC Texas networking event connecting Australians and Texans."}
Type: ${event.type}
Registration: ${event.registration}
URL: ${event.url}

Write FOUR posts. Return ONLY this JSON (no markdown fences):
{
  "linkedin": "150-200 words, professional, include hashtags",
  "twitter": "MAX 260 CHARS HARD LIMIT — punchy, 2-3 hashtags",
  "facebook": "100-150 words, warm friendly community tone",
  "instagram": "150-200 words, visual and enthusiastic, heavy emojis, 10-15 hashtags at end"
}

All posts must include #AACCTexas #AussieTexas. Warm Australian-Texan tone. G'day energy!`}],
        "Return ONLY valid JSON. No markdown fences. No explanation text.");
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
      if(!match){toast("Could not parse response — try again","err"); setGenId(null); return;}
      const parsed=JSON.parse(match[0]);
      const newPosts={...posts,[event.id]:{...parsed,generatedAt:new Date().toISOString()}};
      await savePosts(newPosts);
      // Seed editable copies
      setEditedPosts(prev=>({...prev,[event.id]:{
        linkedin:parsed.linkedin||"",twitter:parsed.twitter||"",
        facebook:parsed.facebook||"",instagram:parsed.instagram||""
      }}));
      setExpandedId(event.id);
      toast("Posts generated! ✍️ Auto-saving .md file...");
      // Auto-export markdown on generation
      const epForExport = {...editedPosts,[event.id]:{linkedin:parsed.linkedin||"",twitter:parsed.twitter||"",facebook:parsed.facebook||"",instagram:parsed.instagram||""}};
      exportMarkdown([event], newPosts, epForExport);
    }catch(e){toast("Error: "+e.message,"err");}
    setGenId(null);
  },[posts]);

  // ── Update edited post text ─────────────────────────────────────────────────
  const updateEditedPost = (eventId, platformKey, value) => {
    setEditedPosts(prev=>({...prev,[eventId]:{...prev[eventId],[platformKey]:value}}));
  };

  // ── Save edited post (persist to storage) ──────────────────────────────────
  const saveEditedPost = async(eventId) => {
    const ep=editedPosts[eventId];
    if(!ep)return;
    const newPosts={...posts,[eventId]:{...posts[eventId],...ep,lastEdited:new Date().toISOString()}};
    await savePosts(newPosts);
    toast("Edits saved ✓");
  };

  // ── Open preview/confirm modal ──────────────────────────────────────────────
  const openModal = (event, platformKey) => {
    const text = (editedPosts[event.id]?.[platformKey]) || (posts[event.id]?.[platformKey]) || "";
    setModal({event, platformKey, text});
    setPostResult(null);
  };

  // ── Confirm post action ─────────────────────────────────────────────────────
  const confirmPost = () => {
    const pCfg = PLATFORMS.find(p=>p.key===modal.platformKey);
    if(!pCfg)return;
    const result = pCfg.postAction(modal.text);
    setPostResult({status:result, note:pCfg.postNote});
  };

  const deleteEvent = async(id)=>{
    await saveEvents(events.filter(e=>e.id!==id));
    const np={...posts}; delete np[id]; await savePosts(np);
    const ne={...editedPosts}; delete ne[id]; setEditedPosts(ne);
    toast("Event removed.");
  };

  const copyScript=()=>{
    navigator.clipboard.writeText(CONSOLE_SCRIPT).then(()=>{setScriptCopied(true);setTimeout(()=>setScriptCopied(false),3000);});
  };

  const upcoming  = events.filter(e=>isFuture(e.date));
  const past      = events.filter(e=>isPast(e.date));
  const withPosts = events.filter(e=>posts[e.id]);

  return (
    <div style={{minHeight:"100vh",background:"#080F1E",fontFamily:"Georgia,'Times New Roman',serif",color:"#E2D9C5"}}>
      {/* Background glow */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
        <div style={{position:"absolute",width:"700px",height:"700px",borderRadius:"50%",background:"radial-gradient(circle,rgba(0,48,143,.12) 0%,transparent 70%)",top:"-200px",left:"-200px"}}/>
        <div style={{position:"absolute",width:"500px",height:"500px",borderRadius:"50%",background:"radial-gradient(circle,rgba(255,205,0,.05) 0%,transparent 70%)",bottom:0,right:"-100px"}}/>
      </div>

      {/* Toast */}
      {notif&&<div style={{position:"fixed",top:20,right:20,zIndex:2000,background:notif.type==="err"?"#7F1D1D":"#14532D",border:`1px solid ${notif.type==="err"?"#F87171":"#4ADE80"}`,color:"#fff",padding:"12px 20px",borderRadius:"10px",boxShadow:"0 8px 32px rgba(0,0,0,.5)",fontSize:"14px",animation:"fadeSlide .3s ease"}}>{notif.msg}</div>}

      {/* ── Preview / Confirm Modal ──────────────────────────────────────────── */}
      {modal&&<PreviewModal modal={modal} postResult={postResult} onConfirm={confirmPost} onClose={()=>{setModal(null);setPostResult(null);}}/>}
      {/* ── Export Modal ─────────────────────────────────────────────────────── */}
      {showExport&&<ExportModal events={events} posts={posts} editedPosts={editedPosts} onClose={()=>setShowExport(false)} toast={toast}/>}

      {/* Header */}
      <div style={{position:"relative",zIndex:1,background:"linear-gradient(135deg,#00205B,#001540)",borderBottom:"2px solid #FFCD00",padding:"18px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
          <div style={{fontSize:"42px",lineHeight:1}}>🦘</div>
          <div>
            <div style={{fontSize:"20px",fontWeight:"bold",color:"#FFCD00",letterSpacing:"2px",textTransform:"uppercase"}}>AACC Texas</div>
            <div style={{fontSize:"11px",color:"#93B4D4",letterSpacing:"2px",textTransform:"uppercase",marginTop:"2px"}}>Event Social Media Assistant · v10</div>
          </div>
        </div>
        <div style={{textAlign:"right",fontSize:"12px",color:"#6B8FAD",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}}>
          <div style={{color:"#93B4D4"}}>📅 {TODAY.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
          {lastScan&&<div style={{marginTop:"2px"}}>🔄 Last scan: {lastScan}</div>}
          {Object.keys(posts).length>0&&(
            <button onClick={()=>setShowExport(true)} style={{background:"linear-gradient(135deg,#FFCD00,#E6B800)",color:"#001A4D",border:"none",borderRadius:"7px",padding:"6px 14px",cursor:"pointer",fontSize:"12px",fontWeight:"bold",display:"flex",alignItems:"center",gap:"5px",marginTop:"4px"}}>
              ⬇️ Export Posts
            </button>
          )}
        </div>
      </div>

      {/* Stats */}
      <div style={{position:"relative",zIndex:1,display:"flex",borderBottom:"1px solid #1E3A5F"}}>
        {[{icon:"📋",val:events.length,label:"Total"},{icon:"🗓️",val:upcoming.length,label:"Upcoming"},{icon:"✅",val:past.length,label:"Past"},{icon:"✍️",val:withPosts.length,label:"Posts Ready"}].map(s=>(
          <div key={s.label} style={{flex:1,padding:"12px 8px",textAlign:"center",background:"rgba(0,0,0,.2)",borderRight:"1px solid #1E3A5F"}}>
            <div style={{fontSize:"22px",fontWeight:"bold",color:"#FFCD00"}}>{s.icon} {s.val}</div>
            <div style={{fontSize:"10px",color:"#6B8FAD",letterSpacing:"1px",textTransform:"uppercase",marginTop:"2px"}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{position:"relative",zIndex:1,maxWidth:"1100px",margin:"0 auto",padding:"24px 16px"}}>

        {/* Scan panel */}
        <div style={{background:"rgba(0,20,60,.6)",border:"1px solid #1E3A5F",borderRadius:"14px",padding:"20px 24px",marginBottom:"24px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:"16px",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:"220px"}}>
              <div style={{fontWeight:"bold",color:"#FFCD00",fontSize:"15px",marginBottom:"6px"}}>🌐 Fetch Events from AACC Texas</div>
              <div style={{fontSize:"12px",color:"#6B8FAD",lineHeight:"1.6"}}>Source: <code style={{color:"#93B4D4"}}>aacc-texas.org/events.html#!event-list</code></div>
              {scanStep&&<div style={{marginTop:"10px",fontSize:"13px",color:scanStep.startsWith("✅")?"#4ADE80":scanStep.startsWith("❌")?"#F87171":"#93B4D4",background:"rgba(0,0,0,.3)",padding:"8px 12px",borderRadius:"6px",lineHeight:"1.5"}}>{scanStep}</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px",flexShrink:0}}>
              <button onClick={autoScan} disabled={scanning} style={{background:scanning?"#1E3A5F":"linear-gradient(135deg,#FFCD00,#E6B800)",color:scanning?"#6B8FAD":"#001A4D",border:"none",borderRadius:"8px",padding:"10px 18px",cursor:scanning?"not-allowed":"pointer",fontSize:"13px",fontWeight:"bold",display:"flex",alignItems:"center",gap:"6px"}}>
                {scanning?<span style={{animation:"pulse 1.2s infinite"}}>⏳ Scanning…</span>:"🔍 Auto Scan"}
              </button>
              <button onClick={()=>setShowScript(s=>!s)} style={{background:"transparent",color:"#93B4D4",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"8px 16px",cursor:"pointer",fontSize:"12px"}}>{showScript?"▲ Hide Script":"🖥️ Console Script"}</button>
              <button onClick={()=>setShowPaste(s=>!s)} style={{background:"transparent",color:"#93B4D4",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"8px 16px",cursor:"pointer",fontSize:"12px"}}>{showPaste?"▲ Hide":"📋 Paste JSON"}</button>
            </div>
          </div>
          {showScript&&(
            <div style={{marginTop:"16px",borderTop:"1px solid #1E3A5F",paddingTop:"16px"}}>
              <div style={{fontSize:"12px",color:"#93B4D4",marginBottom:"8px"}}>Open <a href="https://www.aacc-texas.org/events.html#!event-list" target="_blank" rel="noopener noreferrer" style={{color:"#3B82F6"}}>aacc-texas.org/events.html#!event-list</a> → F12 → Console → paste & run → copy output JSON → paste below.</div>
              <div style={{position:"relative"}}>
                <pre style={{background:"rgba(0,0,0,.5)",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"12px",fontSize:"10px",color:"#93B4D4",overflow:"auto",maxHeight:"120px"}}>{CONSOLE_SCRIPT}</pre>
                <button onClick={copyScript} style={{position:"absolute",top:"8px",right:"8px",background:scriptCopied?"#14532D":"rgba(0,30,80,.8)",color:scriptCopied?"#4ADE80":"#93B4D4",border:`1px solid ${scriptCopied?"#4ADE80":"#1E3A5F"}`,borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"11px"}}>
                  {scriptCopied?"✓ Copied!":"📋 Copy"}
                </button>
              </div>
            </div>
          )}
          {showPaste&&(
            <div style={{marginTop:"16px",borderTop:"1px solid #1E3A5F",paddingTop:"16px"}}>
              <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder='Paste JSON array here...' style={{width:"100%",minHeight:"80px",background:"rgba(0,0,0,.4)",border:"1px solid #2A4A7F",borderRadius:"8px",color:"#E2D9C5",padding:"10px",fontSize:"11px",fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
              <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
                <button onClick={processPaste} disabled={!pasteText.trim()} style={{background:"linear-gradient(135deg,#FFCD00,#E6B800)",color:"#001A4D",border:"none",borderRadius:"8px",padding:"9px 16px",cursor:"pointer",fontSize:"12px",fontWeight:"bold"}}>✅ Load Events</button>
                <button onClick={()=>{setPasteText("");setShowPaste(false);}} style={{background:"transparent",color:"#6B8FAD",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"9px 14px",cursor:"pointer",fontSize:"12px"}}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:"2px",marginBottom:"20px",borderBottom:"1px solid #1E3A5F"}}>
          {[{id:"upcoming",label:`🗓️ Upcoming (${upcoming.length})`},{id:"past",label:`✅ Past (${past.length})`},{id:"posts",label:`✍️ Posts (${withPosts.length})`}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{background:activeTab===t.id?"rgba(0,48,143,.4)":"transparent",color:activeTab===t.id?"#FFCD00":"#6B8FAD",border:"none",borderBottom:activeTab===t.id?"2px solid #FFCD00":"2px solid transparent",padding:"10px 20px",cursor:"pointer",fontSize:"13px",fontWeight:activeTab===t.id?"bold":"normal",transition:"all .2s"}}>{t.label}</button>
          ))}
        </div>

        {activeTab==="upcoming"&&(
          <div>
            {upcoming.length===0?<EmptyState icon="🦘" msg="No upcoming events yet" sub='Click "Auto Scan" to load events.'/>:
              upcoming.map(ev=>(
                <EventCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]}
                  isExpanded={expandedId===ev.id} isGenerating={genId===ev.id}
                  onGenerate={()=>generatePost(ev)}
                  onToggle={()=>setExpandedId(expandedId===ev.id?null:ev.id)}
                  onDelete={()=>deleteEvent(ev.id)}
                  onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)}
                  onSaveEdits={()=>saveEditedPost(ev.id)}
                  onOpenModal={(pKey)=>openModal(ev,pKey)}
                />
              ))
            }
          </div>
        )}
        {activeTab==="past"&&(
          <div>
            {past.length===0?<EmptyState icon="📅" msg="No past events" sub="Events before today appear here."/>:
              past.map(ev=>(
                <EventCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]} isPast
                  isExpanded={expandedId===ev.id} isGenerating={false}
                  onToggle={()=>setExpandedId(expandedId===ev.id?null:ev.id)}
                  onDelete={()=>deleteEvent(ev.id)}
                  onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)}
                  onSaveEdits={()=>saveEditedPost(ev.id)}
                  onOpenModal={(pKey)=>openModal(ev,pKey)}
                />
              ))
            }
          </div>
        )}
        {activeTab==="posts"&&(
          <div>
            {withPosts.length===0?<EmptyState icon="✍️" msg="No posts yet" sub='Go to Upcoming and click "Generate Post".'/>:
              withPosts.map(ev=>(
                <PostCard key={ev.id} event={ev} post={posts[ev.id]} editedPost={editedPosts[ev.id]}
                  onUpdateText={(pKey,val)=>updateEditedPost(ev.id,pKey,val)}
                  onSaveEdits={()=>saveEditedPost(ev.id)}
                  onOpenModal={(pKey)=>openModal(ev,pKey)}
                />
              ))
            }
          </div>
        )}
      </div>

      <style>{`
        @keyframes fadeSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        textarea:focus{outline:1px solid #3B82F6}
      `}</style>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// PREVIEW / CONFIRM MODAL
// ═════════════════════════════════════════════════════════════════════════════
function PreviewModal({modal, postResult, onConfirm, onClose}) {
  const {event, platformKey, text} = modal;
  const pCfg = PLATFORMS.find(p=>p.key===platformKey);
  if(!pCfg) return null;

  // Platform-specific mock UI
  const renderPreview = () => {
    switch(platformKey) {
      case "linkedin": return <LinkedInPreview text={text} event={event}/>;
      case "twitter":  return <TwitterPreview  text={text} event={event}/>;
      case "facebook": return <FacebookPreview text={text} event={event}/>;
      case "instagram":return <InstagramPreview text={text} event={event}/>;
      default: return <div style={{padding:"16px",whiteSpace:"pre-wrap",fontSize:"14px"}}>{text}</div>;
    }
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:1500,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0F1A30",border:"1px solid #1E3A5F",borderRadius:"16px",width:"100%",maxWidth:"560px",maxHeight:"90vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"modalIn .25s ease",boxShadow:"0 24px 64px rgba(0,0,0,.7)"}}>

        {/* Modal header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid #1E3A5F",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{background:pCfg.color,color:"#fff",width:"32px",height:"32px",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"14px",flexShrink:0}}>{pCfg.icon}</div>
            <div>
              <div style={{fontWeight:"bold",color:"#E2D9C5",fontSize:"15px"}}>Post Preview — {pCfg.label}</div>
              <div style={{fontSize:"11px",color:"#6B8FAD",marginTop:"2px"}}>{event.title}</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",color:"#6B8FAD",border:"none",cursor:"pointer",fontSize:"20px",lineHeight:1,padding:"4px"}}>×</button>
        </div>

        {/* Preview area */}
        <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
          <div style={{marginBottom:"12px",fontSize:"12px",color:"#6B8FAD",textTransform:"uppercase",letterSpacing:"1px"}}>This is how your post will appear:</div>
          {/* Event image preview */}
          <div style={{marginBottom:"14px",borderRadius:"10px",overflow:"hidden",border:"1px solid #1E3A5F",height:"120px"}}>
              <img src={modal.event.imageUrl} alt={modal.event.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            </div>
          {renderPreview()}

          {/* Char count warning for Twitter */}
          {platformKey==="twitter"&&text.length>280&&(
            <div style={{marginTop:"10px",padding:"8px 12px",background:"#7F1D1D22",border:"1px solid #F87171",borderRadius:"8px",fontSize:"12px",color:"#F87171"}}>
              ⚠️ Post is {text.length} characters — X/Twitter limit is 280. Please shorten in the editor before posting.
            </div>
          )}
          {platformKey==="instagram"&&(
            <div style={{marginTop:"10px",padding:"8px 12px",background:"rgba(255,205,0,.08)",border:"1px solid #FFCD0033",borderRadius:"8px",fontSize:"12px",color:"#FFCD00"}}>
              📱 Instagram doesn't support web posting. Your post will be copied to clipboard and Instagram will open — paste it in the app or Creator Studio.
            </div>
          )}
          {(platformKey==="linkedin"||platformKey==="facebook")&&(
            <div style={{marginTop:"10px",padding:"8px 12px",background:"rgba(59,130,246,.08)",border:"1px solid #3B82F633",borderRadius:"8px",fontSize:"12px",color:"#93B4D4"}}>
              📋 {pCfg.postNote}
            </div>
          )}
          {platformKey==="twitter"&&text.length<=280&&(
            <div style={{marginTop:"10px",padding:"8px 12px",background:"rgba(59,130,246,.08)",border:"1px solid #3B82F633",borderRadius:"8px",fontSize:"12px",color:"#93B4D4"}}>
              ✈️ {pCfg.postNote}
            </div>
          )}
        </div>

        {/* Action buttons */}
        <div style={{padding:"16px 20px",borderTop:"1px solid #1E3A5F",display:"flex",gap:"10px",alignItems:"center",justifyContent:"flex-end"}}>
          {postResult ? (
            <div style={{display:"flex",alignItems:"center",gap:"12px",width:"100%"}}>
              <div style={{flex:1,fontSize:"13px",color:"#4ADE80"}}>✅ Done! {postResult.note}</div>
              <button onClick={onClose} style={{background:"linear-gradient(135deg,#FFCD00,#E6B800)",color:"#001A4D",border:"none",borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px",fontWeight:"bold"}}>Close</button>
            </div>
          ):(
            <>
              <button onClick={onClose} style={{background:"transparent",color:"#6B8FAD",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px"}}>Cancel</button>
              <button onClick={onConfirm} disabled={platformKey==="twitter"&&text.length>280} style={{

// ═════════════════════════════════════════════════════════════════════════════
// POST EDITOR — editable textareas + Post buttons per platform
// ═════════════════════════════════════════════════════════════════════════════
function PostEditor({post, editedPost, eventId, onUpdateText, onSaveEdits, onOpenModal}) {
  const [dirty, setDirty] = useState(false);

  const handleChange = (pKey, val) => {
    onUpdateText(pKey, val);
    setDirty(true);
  };

  const handleSave = () => {
    onSaveEdits();
    setDirty(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      {PLATFORMS.map(p=>{
        const savedText = post[p.key] || "";
        const currentText = (editedPost && editedPost[p.key] !== undefined) ? editedPost[p.key] : savedText;
        const isEdited = currentText !== savedText;
        const overLimit = p.charLimit && currentText.length > p.charLimit;
        return (
          <div key={p.key} style={{background:"rgba(0,0,0,.25)",borderRadius:"10px",border:`1px solid ${p.color}22`,overflow:"hidden"}}>
            {/* Platform header */}
            <div style={{background:p.color+"18",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${p.color}22`}}>
              <span style={{fontWeight:"bold",fontSize:"13px",color:p.color}}>{p.icon} {p.label}</span>
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                {p.charLimit&&<span style={{fontSize:"11px",color:overLimit?"#F87171":currentText.length>p.charLimit*.9?"#FFCD00":"#4ADE80"}}>{currentText.length}{p.charLimit?`/${p.charLimit}`:""}</span>}
                {isEdited&&<span style={{fontSize:"10px",color:"#F97316",background:"#F9731622",padding:"1px 6px",borderRadius:"4px"}}>edited</span>}
                {/* POST BUTTON */}
                <button
                  onClick={()=>onOpenModal(p.key)}
                  style={{
                    background:`linear-gradient(135deg,${p.color},${p.color}CC)`,
                    color:"#fff",border:"none",borderRadius:"6px",
                    padding:"5px 14px",cursor:"pointer",
                    fontSize:"12px",fontWeight:"bold",
                    boxShadow:`0 2px 8px ${p.color}44`,
                    display:"flex",alignItems:"center",gap:"4px",
                    transition:"all .15s",
                  }}
                >
                  {p.icon} Post
                </button>
              </div>
            </div>
            {/* Editable textarea */}
            <textarea
              value={currentText}
              onChange={e=>handleChange(p.key, e.target.value)}
              style={{
                width:"100%",boxSizing:"border-box",
                minHeight:p.key==="twitter"?"80px":"120px",
                background:"transparent",border:"none",
                color:"#C8D8E8",fontSize:"13px",lineHeight:"1.7",
                padding:"12px 14px",resize:"vertical",
                fontFamily:"Georgia,'Times New Roman',serif",
              }}
            />
            {overLimit&&<div style={{padding:"4px 14px 8px",fontSize:"11px",color:"#F87171"}}>⚠️ Over {p.label} character limit by {currentText.length-p.charLimit} chars</div>}
          </div>
        );
      })}
      {/* Save edits button */}
      {dirty&&(
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={handleSave} style={{background:"linear-gradient(135deg,#22C55E,#16A34A)",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 20px",cursor:"pointer",fontSize:"13px",fontWeight:"bold"}}>
            💾 Save Edits
          </button>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// EXPORT MODAL
// ═════════════════════════════════════════════════════════════════════════════
function ExportModal({events, posts, editedPosts, onClose, toast}) {
  const eventsWithPosts = events.filter(e => posts[e.id]);
  const [selected, setSelected] = useState(new Set(eventsWithPosts.map(e=>e.id)));
  const [fmt, setFmt] = useState("md");

  const toggle = (id) => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };
  const toggleAll = () => {
    if (selected.size === eventsWithPosts.length) setSelected(new Set());
    else setSelected(new Set(eventsWithPosts.map(e=>e.id)));
  };

  const doExport = () => {
    const toExport = eventsWithPosts.filter(e=>selected.has(e.id));
    if (!toExport.length) { toast("No events selected","err"); return; }
    try {
      if (fmt==="md")  exportMarkdown(toExport, posts, editedPosts);
      if (fmt==="csv") exportCSV(toExport, posts, editedPosts);
      if (fmt==="txt") exportTxt(toExport, posts, editedPosts);
      toast(`✅ ${toExport.length} event(s) exported as .${fmt}`);
      onClose();
    } catch(e) { toast("Export error: "+e.message,"err"); }
  };

  const FMT_INFO = {
    md:  {icon:"📝", label:"Markdown (.md)",  desc:"Best for Notion, Obsidian, or GitHub. Readable with headings & formatting."},
    csv: {icon:"📊", label:"Spreadsheet (.csv)", desc:"Opens in Excel or Google Sheets. One row per platform per event."},
    txt: {icon:"📄", label:"Plain Text (.txt)", desc:"Universal. Works in any text editor. Clean section breaks."},
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:1500,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0F1A30",border:"1px solid #1E3A5F",borderRadius:"16px",width:"100%",maxWidth:"520px",maxHeight:"90vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"modalIn .25s ease",boxShadow:"0 24px 64px rgba(0,0,0,.7)"}}>
        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid #1E3A5F",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:"bold",color:"#FFCD00",fontSize:"16px"}}>⬇️ Export Posts</div>
            <div style={{fontSize:"12px",color:"#6B8FAD",marginTop:"2px"}}>Download to your computer — save anywhere you like</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",color:"#6B8FAD",border:"none",cursor:"pointer",fontSize:"20px",lineHeight:1,padding:"4px"}}>×</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"20px",display:"flex",flexDirection:"column",gap:"20px"}}>
          {/* Format picker */}
          <div>
            <div style={{fontSize:"12px",color:"#6B8FAD",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>Format</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {Object.entries(FMT_INFO).map(([key,info])=>(
                <label key={key} onClick={()=>setFmt(key)} style={{display:"flex",alignItems:"flex-start",gap:"12px",padding:"12px 14px",background:fmt===key?"rgba(0,48,143,.4)":"rgba(0,0,0,.2)",border:`1px solid ${fmt===key?"#3B82F6":"#1E3A5F"}`,borderRadius:"10px",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:"18px",height:"18px",borderRadius:"50%",border:`2px solid ${fmt===key?"#3B82F6":"#2A4A7F"}`,background:fmt===key?"#3B82F6":"transparent",flexShrink:0,marginTop:"1px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {fmt===key&&<div style={{width:"7px",height:"7px",borderRadius:"50%",background:"#fff"}}/>}
                  </div>
                  <div>
                    <div style={{fontSize:"14px",color:"#E2D9C5",fontWeight:fmt===key?"bold":"normal"}}>{info.icon} {info.label}</div>
                    <div style={{fontSize:"12px",color:"#6B8FAD",marginTop:"3px"}}>{info.desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>

          {/* Event selector */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{fontSize:"12px",color:"#6B8FAD",textTransform:"uppercase",letterSpacing:"1px"}}>Events ({selected.size}/{eventsWithPosts.length} selected)</div>
              <button onClick={toggleAll} style={{background:"transparent",color:"#3B82F6",border:"none",cursor:"pointer",fontSize:"12px",textDecoration:"underline"}}>
                {selected.size===eventsWithPosts.length?"Deselect all":"Select all"}
              </button>
            </div>
            {eventsWithPosts.length===0 ? (
              <div style={{color:"#4A6A8A",fontSize:"13px",fontStyle:"italic"}}>No posts generated yet.</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {eventsWithPosts.map(ev=>(
                  <label key={ev.id} onClick={()=>toggle(ev.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:selected.has(ev.id)?"rgba(0,48,143,.25)":"rgba(0,0,0,.2)",border:`1px solid ${selected.has(ev.id)?"#1E3A5F22":"#1E3A5F"}`,borderRadius:"8px",cursor:"pointer"}}>
                    <div style={{width:"16px",height:"16px",borderRadius:"3px",border:`2px solid ${selected.has(ev.id)?"#3B82F6":"#2A4A7F"}`,background:selected.has(ev.id)?"#3B82F6":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {selected.has(ev.id)&&<span style={{color:"#fff",fontSize:"10px",lineHeight:1}}>✓</span>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"13px",color:"#E2D9C5",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                      <div style={{fontSize:"11px",color:"#6B8FAD"}}>{fmtDate(ev.date)}</div>
                    </div>
                    <div style={{fontSize:"11px",color:"#4ADE80",flexShrink:0}}>
                      {PLATFORMS.filter(p=>posts[ev.id]?.[p.key]).length} platforms
                    </div>
                  </label>
                ))}
              </div>
            )}
          </div>

          {/* Tip */}
          <div style={{background:"rgba(255,205,0,.07)",border:"1px solid #FFCD0022",borderRadius:"8px",padding:"12px 14px",fontSize:"12px",color:"#A89060",lineHeight:"1.6"}}>
            💡 <strong style={{color:"#FFCD00"}}>Tip:</strong> Set Chrome's default download folder to save straight to a specific desktop folder — Chrome → Settings → Downloads → Change location.
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"16px 20px",borderTop:"1px solid #1E3A5F",display:"flex",gap:"10px",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:"transparent",color:"#6B8FAD",border:"1px solid #1E3A5F",borderRadius:"8px",padding:"9px 20px",cursor:"pointer",fontSize:"13px"}}>Cancel</button>
          <button onClick={doExport} disabled={selected.size===0} style={{background:selected.size===0?"#1E3A5F":"linear-gradient(135deg,#FFCD00,#E6B800)",color:selected.size===0?"#4A6A8A":"#001A4D",border:"none",borderRadius:"8px",padding:"9px 22px",cursor:selected.size===0?"not-allowed":"pointer",fontSize:"13px",fontWeight:"bold"}}>
            {exporting ? <span style={{animation:"pulse 1s infinite"}}>⏳ Fetching images…</span> : `⬇️ Download ${selected.size > 0 ? `(${selected.size} event${selected.size>1?"s":""})` : ""}`}
          </button>
        </div>
      </div>
    </div>
  );
}
